# Single workspace for the whole repo: the published backend libraries
# (backend/packages), the private backend packages (backend/internal — the
# executor/benchmark harnesses), the frontend Nuxt layer (frontend/app), and
# the example deployments (deploy/*). One workspace = one lockfile = one
# changesets setup spanning FE + BE.
# Pin the entire Vue runtime family to one version. Nuxt 4.4.8's transitive deps
# pin parts of the graph to vue@3.5.38 while the frontend app's direct dependency
# resolves higher, so WITHOUT this two copies of Vue get bundled into the SPA.
# Vue's render internals are module-level singletons (e.g. `renderSlot` reads
# `currentRenderingInstance`), so the second copy sees a null instance and the app
# crashes on boot with `Cannot read properties of null (reading 'ce')` — a blank
# 500 page that hangs the whole e2e suite. One version = one singleton. Keep these
# in lockstep with the `vue` range in frontend/app/package.json.
# The floor is 3.5.40: `@modular-vue/*` peer-requires `vue@^3.5.40`, so the whole
# family moves up together to keep the single-singleton invariant while satisfying
# the modular-vue adoption (docs/initiatives/modular-vue-adoption.md).
# vue-router is likewise pinned to one version. Nuxt 4.5.0 wants `vue-router@^5.2.0`
# while `@nuxtjs/i18n` still resolves `^5.1.0`, so without this the SPA bundles two
# copies of vue-router. The `@modular-vue/*` packages peer-require `vue-router@^5.0.0`,
# so 5.2.0 satisfies every consumer — one version, one router singleton. Keep it in
# lockstep with whatever `vue-router` Nuxt pulls on the next Nuxt bump.
overrides:
  vue: 3.5.40
  vue-router: 5.2.0
  # Single neutral engine: @modular-vue/* (bindings) pull @modular-frontend/core@0.4.0
  # (the subject-keyed panels — slice 4), but @modular-frontend/journeys-engine@1.8.0
  # still deps 0.3.0, which would drag a SECOND copy of the core into the tree. 0.4.0 is
  # an additive superset of 0.3.0 (it only adds definePanelGroup/resolvePanels/PanelEntry/
  # PanelGroupHandle — nothing removed), so pinning one 0.4.0 keeps the panels types a
  # single identity everywhere. Prune once the engine's core dep is bumped to ^0.4.0
  # upstream (the peer-range residual noted in the slice-4 tracker row).
  '@modular-frontend/core': 0.4.0
  '@vue/compiler-core': 3.5.40
  '@vue/compiler-dom': 3.5.40
  '@vue/compiler-sfc': 3.5.40
  '@vue/compiler-ssr': 3.5.40
  '@vue/reactivity': 3.5.40
  '@vue/runtime-core': 3.5.40
  '@vue/runtime-dom': 3.5.40
  '@vue/server-renderer': 3.5.40
  '@vue/shared': 3.5.40
packages:
  - 'backend/packages/*'
  - 'backend/runtimes/*'
  - 'backend/internal/*'
  - 'frontend/app'
  - 'deploy/backend'
  - 'deploy/frontend'
  - 'deploy/node'
  - 'deploy/local'
allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  msw: false
  sharp: true
  vue-demi: true
  workerd: true
# The `minimumReleaseAge` supply-chain gate refuses registry packages younger
# than the configured window. Only ever list packages WE OWN here (wildcard
# namespaces, or an unscoped package published by the same maintainer as this
# repo, e.g. layered-loader) — our own freshly-published packages are trusted
# and must never be age-gated. Do NOT add per-version exceptions for third-party
# packages: when upgrading, pick the latest version that already satisfies the
# release-age rule instead.
#
# The `nuxt` / `@nuxt/*` entries are a DELIBERATE, owner-authorized exception to
# that third-party rule: the Nuxt 4.5.0 bump (needed for the modular-vue journeys
# adoption, docs/initiatives/modular-vue-adoption.md) landed the same day it was
# published, so its `nuxt` + freshly co-published `@nuxt/*` (kit/schema/
# vite-builder/nitro-server) sub-packages are all inside the release-age window.
# These are the Nuxt framework we already run — trusted — so they're excluded to
# let the bump install. Prune them at the next dependency sweep once 4.5.x has
# aged past the window (they self-heal — an aged version no longer needs the
# exclusion). This is the ONLY sanctioned third-party exception; do not add more.
minimumReleaseAgeExclude:
  - '@cat-factory/*'
  - '@toad-contracts/*'
  - '@modular-vue/*'
  - '@modular-frontend/*'
  - layered-loader
  - toad-scheduler
  - nuxt
  - '@nuxt/*'
