# Single workspace for the whole repo: the published backend libraries
# (backend/packages), the private backend packages (backend/internal — the
# executor/benchmark harnesses), the frontend Nuxt layer (frontend/app), and
# the example deployments (deploy/*). One workspace = one lockfile = one
# changesets setup spanning FE + BE.
packages:
  - 'backend/packages/*'
  - 'backend/runtimes/*'
  - 'backend/internal/*'
  - 'frontend/app'
  - 'deploy/backend'
  - 'deploy/frontend'
  - 'deploy/node'
  - 'deploy/local'
allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  msw: false
  sharp: true
  vue-demi: true
  workerd: true
minimumReleaseAgeExclude:
  - '@oxfmt/*'
  - '@oxlint/*'
  - 'oxfmt'
  - 'oxlint'
  - 'workers-ai-provider@3.2.1'
  - '@toad-contracts/core@0.4.0'
  - '@toad-contracts/frontend-http-client@0.3.2'
  - '@toad-contracts/hono@0.3.2'
  - '@toad-contracts/testing@0.3.2'
  - '@toad-contracts/valibot@0.5.0'
  - '@cloudflare/workers-types@4.20260628.1'
  - 'valibot@1.4.2'
