# Single workspace for the whole repo: the published backend libraries
# (backend/packages), the private backend packages (backend/internal — the
# implementer/benchmark harnesses), the frontend Nuxt layer (frontend/app), and
# the example deployments (deploy/*). One workspace = one lockfile = one
# changesets setup spanning FE + BE.
packages:
  - 'backend/packages/*'
  - 'backend/internal/*'
  - 'frontend/app'
  - 'deploy/backend'
  - 'deploy/frontend'
allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  sharp: true
  vue-demi: true
  workerd: true
minimumReleaseAgeExclude:
  - '@oxfmt/*'
  - '@oxlint/*'
  - 'oxfmt'
  - 'oxlint'
  - 'workers-ai-provider@3.2.0'
