name = "cat-factory-backend"
main = "src/index.ts"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]

# Production D1 database (created via `wrangler d1 create cat_factory` on the
# iselwin@gmail.com account). For local/test runs wrangler uses a local sqlite
# shadow keyed by this name, so the id only matters for --remote operations.
[[d1_databases]]
binding = "DB"
database_name = "cat_factory"
database_id = "30748a59-c500-4f31-804f-e48f1588d4ac"
migrations_dir = "migrations"

# Cloudflare Workers AI binding — one of the providers the agent executor can
# route to. Optional: leave agents disabled and this is unused.
[ai]
binding = "AI"

# Durable execution engine. Each pipeline run becomes one Workflows instance
# (see src/infrastructure/workflows/ExecutionWorkflow.ts). Only used when
# EXECUTION_MODE = "workflow"; tick mode leaves it unused.
[[workflows]]
binding = "EXECUTION_WORKFLOW"
name = "cat-factory-execution"
class_name = "ExecutionWorkflow"

# Durable full-repo backfill for the GitHub integration (initial connect and
# explicit `full` resyncs). Only used when a GitHub App is configured.
[[workflows]]
binding = "GITHUB_BACKFILL_WORKFLOW"
name = "cat-factory-github-backfill"
class_name = "GitHubBackfillWorkflow"

# Per-run code-implementation containers (see src/infrastructure/containers and
# @cat-factory/implementer-harness). Each run addresses its own instance, which
# runs the Pi coding agent. Only used when CONTAINER_IMPL_ENABLED = "true"; the
# image carries no secrets (the per-job GitHub + LLM-proxy tokens are passed at
# dispatch time). The class is a container-enabled Durable Object.
[[containers]]
class_name = "ImplementationContainer"
image = "../implementer-harness/Dockerfile"
max_instances = 10

[[durable_objects.bindings]]
name = "IMPL_CONTAINER"
class_name = "ImplementationContainer"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ImplementationContainer"]

# GitHub sync queue: the webhook endpoint verifies + acks fast, enqueuing each
# delivery here for async projection. The consumer also handles targeted repo
# resyncs from the cron reconciler and the on-demand resync endpoint. When the
# binding is absent (as below, and in tests) the worker applies webhook/resync
# work inline — fine for local dev. To enable the fast-ack async path in
# production, create the queues and uncomment both blocks:
#   wrangler queues create cat-factory-github-sync
#   wrangler queues create cat-factory-github-dlq
# (queue consumers are left commented because the test pool registers one
# consumer per test file, which collides on a shared queue — same reason
# EXECUTION_QUEUE above is opt-in.)
# [[queues.producers]]
# binding = "GITHUB_SYNC_QUEUE"
# queue = "cat-factory-github-sync"
#
# [[queues.consumers]]
# queue = "cat-factory-github-sync"
# max_batch_size = 10
# max_concurrency = 5           # bounds concurrent GitHub API usage per batch
# max_retries = 5
# dead_letter_queue = "cat-factory-github-dlq"

# Optional admission queue. By default runs are created directly by
# WorkflowsWorkRunner and bounded by Workflows' own concurrency. To instead cap
# how fast runs are *started*, create the queues and uncomment both blocks (and
# the EXECUTION_QUEUE binding becomes active automatically):
#   wrangler queues create cat-factory-execution-starts
#   wrangler queues create cat-factory-execution-dlq
# [[queues.producers]]
# binding = "EXECUTION_QUEUE"
# queue = "cat-factory-execution-starts"
#
# [[queues.consumers]]
# queue = "cat-factory-execution-starts"
# max_batch_size = 1
# max_concurrency = 10          # bounds concurrent run starts (1-250)
# max_retries = 3
# dead_letter_queue = "cat-factory-execution-dlq"

# Scheduled work (routed by cron in src/index.ts `scheduled`):
#   */2 * * * *  — backstop sweeper (re-drive dead runs) + GitHub reconcile.
#   0 3 * * *    — daily storage-retention sweep (windows are days-to-months,
#                  so it doesn't belong on the 2-min cadence).
[triggers]
crons = ["*/2 * * * *", "0 3 * * *"]

[vars]
# Agent LLM configuration (see src/infrastructure/config.ts). Agents are off by
# default so the service runs as a pure simulation until an operator opts in.
AGENTS_ENABLED = "false"
# Default model for unpinned blocks/agents. Left unset so it tracks the Qwen
# model from the picker catalog (its Cloudflare flavour, or direct DashScope when
# QWEN_API_KEY is configured). Uncomment to pin a specific provider/model:
# AGENT_DEFAULT_PROVIDER = "workers-ai"
# AGENT_DEFAULT_MODEL = "@cf/qwen/qwen3-30b-a3b-fp8"
# Execution engine: "tick" (legacy browser-driven polling, default) or
# "workflow" (durable, server-driven via Cloudflare Workflows).
EXECUTION_MODE = "tick"
DECISION_TIMEOUT = "24 hours"

# Container-based implementation (see src/infrastructure/containers and
# src/infrastructure/ai/ContainerAgentExecutor.ts). When "true" (and AGENTS_ENABLED,
# a GitHub App, a direct OpenAI-compatible provider key and WORKER_PUBLIC_URL are
# all set), the `coder` step runs in a per-run Pi container that clones the repo,
# implements the block and opens a PR. Best paired with EXECUTION_MODE = "workflow"
# since a container run is long. The container reaches the LLM only via this
# Worker's proxy at ${WORKER_PUBLIC_URL}/v1, so no provider key enters the image.
CONTAINER_IMPL_ENABLED = "false"
# Public origin of this Worker; required for container implementation.
# WORKER_PUBLIC_URL = "https://cat-factory-backend.<account>.workers.dev"

# Spend safeguard (see src/infrastructure/config.ts). Token usage is metered per
# LLM call into a ledger, priced into SPEND_CURRENCY, and gated by a monthly
# budget; when reached, runs pause and the frontend shows a warning.
SPEND_MONTHLY_LIMIT = "100"
SPEND_CURRENCY = "EUR"
# Optional per-model price overrides (per 1M tokens), merged over the built-in
# defaults. Keys are "provider:model" or a bare "provider".
# SPEND_MODEL_PRICES = '{"openai:gpt-4o":{"inputPerMillion":2.3,"outputPerMillion":9.2}}'

# Per-block model picker (see src/infrastructure/ai/CloudflareModelProvider.ts and
# MODEL_CATALOG in @cat-factory/core). Every model runs on the Workers AI binding
# above by default; setting a provider key below switches that model to its direct
# API instead (Llama has no direct variant). Set the keys as secrets:
#   wrangler secret put QWEN_API_KEY       # Qwen → Alibaba DashScope (intl endpoint)
#   wrangler secret put DEEPSEEK_API_KEY   # DeepSeek → DeepSeek API
#   wrangler secret put MOONSHOT_API_KEY   # Kimi → Moonshot AI

# Storage retention (see src/infrastructure/config.ts and
# docs/storage-and-retention.md). The cron sweeper prunes the tables that don't
# self-limit to these age windows (in days); 0 disables a table's pass. Defaults
# are applied when unset, so these are shown only for visibility/tuning.
# token_usage: generous — the spend budget only reads the current period.
# TOKEN_USAGE_RETENTION_DAYS = "395"
# github_rate_limits: aggressive — pure telemetry, only recent headroom matters.
# GITHUB_RATE_LIMIT_RETENTION_DAYS = "7"
# github_commits: also bounds the initial backfill window to the same age.
# GITHUB_COMMIT_RETENTION_DAYS = "90"

# GitHub App integration (see src/infrastructure/config.ts and
# docs/github-operations.md). Off until an App is configured: set the App id/slug
# here and the private key (PKCS#8 PEM) + webhook secret as secrets:
#   wrangler secret put GITHUB_APP_PRIVATE_KEY
#   wrangler secret put GITHUB_WEBHOOK_SECRET
GITHUB_APP_ID = ""
GITHUB_APP_SLUG = ""
GITHUB_API_BASE = "https://api.github.com"
# Where to send the browser after a successful install:
# GITHUB_SETUP_REDIRECT_URL = "https://app.example.com/settings/github"

# "Login with GitHub" (see src/infrastructure/config.ts and docs/auth.md).
# REQUIRED in production: the auth gate fails closed, so until an OAuth app is
# configured the protected API returns 503. Set the client id here and the
# secrets via
#   wrangler secret put GITHUB_OAUTH_CLIENT_SECRET
#   wrangler secret put AUTH_SESSION_SECRET   # any high-entropy random string
# The client id/secret may be a GitHub App's OAuth credentials or a classic
# OAuth App's. Register the callback URL as <worker-origin>/auth/callback.
# (Local dev/tests run open via AUTH_DEV_OPEN=true in .dev.vars — NEVER set that
# here; doing so would re-open production.)
GITHUB_OAUTH_CLIENT_ID = ""
# Fixed SPA landing URL after login (strongly recommended in production):
# AUTH_SUCCESS_REDIRECT_URL = "https://app.example.com"
# Session lifetime in hours (default 168 = 7 days):
# AUTH_SESSION_TTL_HOURS = "168"
# Restrict sign-in to specific GitHub users (comma-separated; empty = anyone):
# AUTH_ALLOWED_LOGINS = "octocat,hubot"

# Confluence integration (see src/infrastructure/config.ts). Off by default. Turn
# it on to let workspaces link requirements/RFCs/PRDs and spawn board structure
# from them. Per-workspace site credentials (base URL, account email, API token)
# are entered in the app and stored in D1 — there are no Confluence secrets here.
# The planner extracts structure with the configured agent model when set to
# "llm"; otherwise it uses a deterministic heading parser.
CONFLUENCE_ENABLED = "false"
CONFLUENCE_PLANNER = "llm"

# Ephemeral environment provider integration (see src/infrastructure/config.ts).
# Off by default. Turn it on to let a workspace register its own self-rolled
# environment management API (a declarative HTTP manifest) so a `deployer` agent
# can provision ephemeral environments a `tester` then runs against. The
# per-tenant provider credentials are entered in the app and stored ENCRYPTED in
# D1 — there are no provider secrets here. The one secret this feature needs is
# the service-level master key used to encrypt them at rest, required when
# enabled; set it as a secret (never commit it):
#   openssl rand -base64 32 | wrangler secret put ENVIRONMENTS_ENCRYPTION_KEY
ENVIRONMENTS_ENABLED = "false"
