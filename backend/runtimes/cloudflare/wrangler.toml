# Worker LIBRARY test/dev config — NOT the production deployment.
#
# @cat-factory/worker is a reusable library: it ships `createApp()`, the default
# fetch/scheduled/queue handler, and the Durable Object + Workflow classes, but
# carries no production configuration. This wrangler.toml exists only so the
# package can (a) run its integration suite on the real `workerd` via
# @cloudflare/vitest-pool-workers (see vitest.config.ts, which points at this
# file) and (b) be exercised locally with `wrangler dev` (auth opened via
# .dev.vars). It declares the bindings the runtime needs and nothing else — no
# custom domains, no secrets, no production `[vars]`.
#
# The real, annotated production configuration lives in the deployment example at
# deploy/backend/wrangler.toml, which re-exports this library and supplies all
# `[vars]`, the published runner image, the D1 id, triggers and queues. Copy that
# file when provisioning your own deployment.
name = "cat-factory-worker-dev"
main = "src/index.ts"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]

# Local D1. Tests apply the migrations in ./migrations to a local sqlite shadow
# keyed by this name (see test/apply-migrations.ts); no remote id is needed.
[[d1_databases]]
binding = "DB"
database_name = "cat_factory"
migrations_dir = "migrations"

# Dedicated telemetry database (llm_call_metrics + agent_context_snapshots). Its own
# migrations_dir; the vitest pool provisions it as a separate local D1.
[[d1_databases]]
binding = "TELEMETRY_DB"
database_name = "cat_factory_telemetry"
migrations_dir = "telemetry-migrations"

# Dedicated D1 for the Sandbox (parallel prompt/model testing), its own migrations
# lineage. Opt-in in production; declared here so the integration/conformance suite can
# exercise the feature (test/apply-migrations.ts applies sandbox-migrations to it).
[[d1_databases]]
binding = "SANDBOX_DB"
database_name = "cat_factory_sandbox"
migrations_dir = "sandbox-migrations"

# Separate D1 database for the high-churn provisioning event log (its own binding +
# migrations). Tests apply ./migrations-provisioning to it (see test/apply-migrations.ts).
[[d1_databases]]
binding = "PROVISIONING_DB"
database_name = "cat_factory_provisioning"
migrations_dir = "migrations-provisioning"

# Workers AI binding. Tests inject a FakeAgentExecutor and never touch env.AI
# (vitest.config.ts sets remoteBindings:false); declared so the binding shape
# matches production.
[ai]
binding = "AI"

# R2 bucket for binary artifacts (UI screenshots + reference design images). The blob
# bytes go here; the queryable metadata lives in the main DB. The vitest workers pool
# binds this against the miniflare R2 simulator, so the integration tests exercise the
# real `R2BinaryBlobBackend` path (not a stub) — buildContainer wires it whenever the
# ARTIFACT_BUCKET binding is present.
[[r2_buckets]]
binding = "ARTIFACT_BUCKET"
bucket_name = "cat-factory-artifacts"

# Durable execution engine — one Workflows instance per run.
[[workflows]]
binding = "EXECUTION_WORKFLOW"
name = "cat-factory-execution"
class_name = "ExecutionWorkflow"

# Durable full-repo backfill for the GitHub integration.
[[workflows]]
binding = "GITHUB_BACKFILL_WORKFLOW"
name = "cat-factory-github-backfill"
class_name = "GitHubBackfillWorkflow"

# Durable driver for the "bootstrap repo" task.
[[workflows]]
binding = "BOOTSTRAP_WORKFLOW"
name = "cat-factory-bootstrap"
class_name = "BootstrapWorkflow"

# Durable driver for the environment-provider config-repair agent.
[[workflows]]
binding = "ENV_CONFIG_REPAIR_WORKFLOW"
name = "cat-factory-env-config-repair"
class_name = "EnvConfigRepairWorkflow"

# Durable driver for the ephemeral-environment self-test diagnostic.
[[workflows]]
binding = "ENV_TEST_WORKFLOW"
name = "cat-factory-env-test"
class_name = "EnvironmentTestWorkflow"

# Per-run implementation container. The acceptance suite builds this image from
# the internal harness package's Dockerfile, so dev/test reference it by local
# path; the production deployment instead references the published GHCR image
# (ghcr.io/<owner>/cat-factory-executor) — see deploy/backend/wrangler.toml.
[[containers]]
class_name = "ExecutionContainer"
image = "../../internal/executor-harness/Dockerfile"
max_instances = 10
instance_type = "standard-1"

[[durable_objects.bindings]]
name = "EXEC_CONTAINER"
class_name = "ExecutionContainer"

# Per-run DEPLOY container (the separate deploy-harness image: real kubectl/kustomize/helm).
# The `image: 'deploy'` dispatch variant routes here while agent jobs stay on ExecutionContainer.
[[containers]]
class_name = "DeployContainer"
image = "../../internal/deploy-harness/Dockerfile"
max_instances = 10
instance_type = "standard-1"

[[durable_objects.bindings]]
name = "DEPLOY_CONTAINER"
class_name = "DeployContainer"

# Per-workspace WebSocket fan-out hub.
[[durable_objects.bindings]]
name = "WORKSPACE_EVENTS"
class_name = "WorkspaceEventsHub"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ImplementationContainer"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["WorkspaceEventsHub"]

[[migrations]]
tag = "v3"
renamed_classes = [{ from = "ImplementationContainer", to = "ExecutionContainer" }]

[[migrations]]
tag = "v4"
new_sqlite_classes = ["DeployContainer"]
