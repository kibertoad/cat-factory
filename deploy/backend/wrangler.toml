# Backend deployment — Cloudflare Worker + D1.
#
# This is the production-shaped EXAMPLE deployment of the @cat-factory/worker
# library. The Worker code is the library (re-exported from src/index.ts); this
# file is all the per-deployment configuration. Copy this package, set the values
# below to your own resources, and run `pnpm deploy`.
#
# Every value here is per-deployment. The IDs/origins shown are the maintainer's
# own deployment (kept so the repo is also a working deployment); change them.
name = "cat-factory-backend"
main = "src/index.ts"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]

# Workers Observability (Workers Logs). Captures invocation logs + the structured
# pino traces this worker emits (controller→service→workflow→bootstrapper→harness)
# and makes them queryable in the Cloudflare dashboard. head_sampling_rate = 1
# keeps 100% of invocations; lower it if log volume/cost becomes a concern.
[observability]
enabled = true
head_sampling_rate = 1

# Production D1 database (created via `wrangler d1 create cat_factory`). For
# local/test runs wrangler uses a local sqlite shadow keyed by this name, so the
# id only matters for --remote operations.
#
# The schema migrations ship WITH the @cat-factory/worker library, so this points
# at the installed package's migrations directory (pnpm symlinks it into this
# package's node_modules). If your tooling can't read through the symlink, copy
# them locally instead: `cp -r node_modules/@cat-factory/worker/migrations ./migrations`
# and set migrations_dir = "migrations".
[[d1_databases]]
binding = "DB"
database_name = "cat_factory"
database_id = "30748a59-c500-4f31-804f-e48f1588d4ac"
migrations_dir = "node_modules/@cat-factory/worker/migrations"

# Dedicated telemetry database (llm_call_metrics + agent_context_snapshots) — required.
# Provision it once with `wrangler d1 create cat_factory_telemetry` and paste its id here.
# Its schema ships with the worker package under telemetry-migrations/.
[[d1_databases]]
binding = "TELEMETRY_DB"
database_name = "cat_factory_telemetry"
database_id = "bd8a599d-04f0-4cdf-b9c6-5e27f78012c9"
migrations_dir = "node_modules/@cat-factory/worker/telemetry-migrations"

# OPTIONAL: dedicated D1 for the Sandbox (the parallel prompt/model testing surface).
# It has its OWN migrations lineage (the package's sandbox-migrations/), kept separate
# from the main DB above for blast-radius isolation. Omit this binding to run without the
# Sandbox (its API then answers 503). To enable: create a second D1 database
# (`wrangler d1 create cat_factory_sandbox`), paste its id below, and apply its migrations
# (`wrangler d1 migrations apply cat_factory_sandbox`). Because wrangler applies one
# migrations_dir per database, this points at the package's sandbox-migrations/ folder.
[[d1_databases]]
binding = "SANDBOX_DB"
database_name = "cat_factory_sandbox"
database_id = "3f228c93-535e-4d30-a221-e73615cf0ad2"
migrations_dir = "node_modules/@cat-factory/worker/sandbox-migrations"

# OPTIONAL: SEPARATE D1 database for the high-churn provisioning event log (its own binding
# + migrations dir, shipped with the library). Omit this binding to run with the
# provisioning-log feature OFF (env/runner/container attempts aren't recorded). To enable:
# create it once (`wrangler d1 create cat_factory_provisioning`), paste the returned id
# below, uncomment this block, and apply its migrations. Keeping it in its own database
# isolates the log's write churn from the main application data.
# [[d1_databases]]
# binding = "PROVISIONING_DB"
# database_name = "cat_factory_provisioning"
# database_id = "REPLACE_WITH_cat_factory_provisioning_DATABASE_ID"
# migrations_dir = "node_modules/@cat-factory/worker/migrations-provisioning"

# Cloudflare Workers AI binding — one of the providers the agent executor can
# route to. Optional: leave agents disabled and this is unused.
[ai]
binding = "AI"

# R2 bucket for binary artifacts (UI screenshots + reference design images) used by
# the visual-confirmation gate. The blob bytes go to R2 (D1 can't hold large values);
# the queryable metadata lives in the main DB. Optional: omit to disable the
# binary-artifact store (the visual-confirmation gate then has nowhere to store
# screenshots). Create the bucket with `wrangler r2 bucket create cat-factory-artifacts`.
[[r2_buckets]]
binding = "ARTIFACT_BUCKET"
bucket_name = "cat-factory-artifacts"

# Durable execution engine. Each pipeline run becomes one Workflows instance
# (ExecutionWorkflow) — the only path that drives runs, so this binding is always
# used in a real deployment.
[[workflows]]
binding = "EXECUTION_WORKFLOW"
name = "cat-factory-execution"
class_name = "ExecutionWorkflow"

# Durable full-repo backfill for the GitHub integration (initial connect and
# explicit `full` resyncs). Only used when a GitHub App is configured.
[[workflows]]
binding = "GITHUB_BACKFILL_WORKFLOW"
name = "cat-factory-github-backfill"
class_name = "GitHubBackfillWorkflow"

# Durable driver for the "bootstrap repo" task (BootstrapWorkflow). Each run
# becomes one instance whose id is the bootstrap job id; it polls the per-run
# container, streaming subtask progress to the board and, on success, linking the
# new repo to its service frame. Only used when the bootstrap prerequisites are
# configured.
[[workflows]]
binding = "BOOTSTRAP_WORKFLOW"
name = "cat-factory-bootstrap"
class_name = "BootstrapWorkflow"

# Durable driver for the environment-provider config-repair agent
# (EnvConfigRepairWorkflow). Each run becomes one instance whose id is the repair
# job id; it polls the per-run container, streaming subtask progress, and on success
# re-validates the repo. Only used when the agent prerequisites are configured.
[[workflows]]
binding = "ENV_CONFIG_REPAIR_WORKFLOW"
name = "cat-factory-env-config-repair"
class_name = "EnvConfigRepairWorkflow"

# Per-run code-implementation containers (the @cat-factory/executor-harness
# Pi coding-agent image). Each run addresses its own instance. Container-based
# implementation is always on — this binding (or a registered runner pool) is a
# hard prerequisite and the Worker refuses to start without one. The image carries
# no secrets (the per-job GitHub + LLM-proxy tokens are passed at dispatch time).
#
# The runner image must live in a registry Cloudflare Containers can PULL from:
# the Cloudflare managed registry (registry.cloudflare.com), Docker Hub, or ECR.
# GHCR is NOT a supported pull source (a `ghcr.io/...` ref here fails the deploy
# with IMAGE_REGISTRY_NOT_CONFIGURED), even for a public package — so we publish
# the image into the managed registry and reference it here. The CI-built GHCR
# image (`ghcr.io/<owner>/cat-factory-executor`) is the canonical published
# artifact (forks/reproducibility); it is mirrored here, not pulled directly.
#
# Publish/refresh the managed-registry image before deploying:
#   pnpm image:publish          # = wrangler containers build ... --push
# It prints the exact registry.cloudflare.com/<account_id>/<image>:<tag> ref;
# pin that tag here (the account id below is THIS deployment's — change it).
[[containers]]
class_name = "ExecutionContainer"
image = "registry.cloudflare.com/fe0047c6e869c8cb875ca425a9c341af/cat-factory-executor:1.41.0"
max_instances = 10
# Coding/bootstrap runs legitimately install dependencies and run build/test/e2e
# suites inside the box. The default `dev` tier (~256 MiB / ~1/16 vCPU) thrashes
# and OOMs under that load. `standard-1` (4 GiB / 0.5 vCPU) gives those commands
# real headroom; tune up (standard-2/3/4) if heavier stacks need it.
instance_type = "standard-1"

[[durable_objects.bindings]]
name = "EXEC_CONTAINER"
class_name = "ExecutionContainer"

# Per-run DEPLOY containers (the @cat-factory/deploy-harness image: a slim base with
# real kubectl/kustomize/helm). The `image: 'deploy'` dispatch variant — a Kubernetes
# service whose manifests need rendering (kustomize/helm/secretGenerator/Gateway-API) —
# routes here; plain agent runs stay on ExecutionContainer, so the k8s CLIs never bloat
# their cold-start. Like the executor image, this must live in a registry Cloudflare
# Containers can PULL from (registry.cloudflare.com / Docker Hub / ECR — NOT GHCR).
# Publish/refresh it before deploying:
#   pnpm image:publish:deploy   # = wrangler containers build ../../backend/internal/deploy-harness ...
# Then pin that managed-registry tag here (the account id is THIS deployment's). Omit
# this binding to leave container-backed Kubernetes provisioning off (the synchronous
# raw-manifest REST path still works); a render-needing config then fails loudly.
[[containers]]
class_name = "DeployContainer"
image = "registry.cloudflare.com/fe0047c6e869c8cb875ca425a9c341af/cat-factory-deploy:0.2.5"
max_instances = 10
# kustomize/helm rendering + kubectl apply/rollout is light vs a coding run, but the
# slim base still wants real headroom for a large manifest tree; standard-1 matches the
# executor tier for simplicity (tune down to `dev` if your manifests are small).
instance_type = "standard-1"

[[durable_objects.bindings]]
name = "DEPLOY_CONTAINER"
class_name = "DeployContainer"

# Per-workspace WebSocket fan-out hub (WorkspaceEventsHub). One instance per
# workspace, addressed by idFromName(workspaceId); it holds subscribers' sockets
# (hibernatable) and broadcasts execution/board events pushed by the engine.
[[durable_objects.bindings]]
name = "WORKSPACE_EVENTS"
class_name = "WorkspaceEventsHub"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ImplementationContainer"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["WorkspaceEventsHub"]

[[migrations]]
tag = "v3"
renamed_classes = [{ from = "ImplementationContainer", to = "ExecutionContainer" }]

[[migrations]]
tag = "v4"
new_sqlite_classes = ["DeployContainer"]

# GitHub sync queue: the webhook endpoint verifies + acks fast, enqueuing each
# delivery here for async projection. The consumer also handles targeted repo
# resyncs from the cron reconciler and the on-demand resync endpoint. When the
# binding is absent (as below) the worker applies webhook/resync work inline —
# fine for local dev. To enable the fast-ack async path in production, create the
# queues and uncomment both blocks:
#   wrangler queues create cat-factory-github-sync
#   wrangler queues create cat-factory-github-dlq
# [[queues.producers]]
# binding = "GITHUB_SYNC_QUEUE"
# queue = "cat-factory-github-sync"
#
# [[queues.consumers]]
# queue = "cat-factory-github-sync"
# max_batch_size = 10
# max_concurrency = 5           # bounds concurrent GitHub API usage per batch
# max_retries = 5
# dead_letter_queue = "cat-factory-github-dlq"

# Optional admission queue. By default runs are created directly by
# WorkflowsWorkRunner and bounded by Workflows' own concurrency. To instead cap
# how fast runs are *started*, create the queues and uncomment both blocks (and
# the EXECUTION_QUEUE binding becomes active automatically):
#   wrangler queues create cat-factory-execution-starts
#   wrangler queues create cat-factory-execution-dlq
# [[queues.producers]]
# binding = "EXECUTION_QUEUE"
# queue = "cat-factory-execution-starts"
#
# [[queues.consumers]]
# queue = "cat-factory-execution-starts"
# max_batch_size = 1
# max_concurrency = 10          # bounds concurrent run starts (1-250)
# max_retries = 3
# dead_letter_queue = "cat-factory-execution-dlq"

# Scheduled work (routed by cron in the worker's `scheduled` handler):
#   */2 * * * *  — backstop sweeper (re-drive dead runs) + GitHub reconcile.
#   0 3 * * *    — daily storage-retention sweep (windows are days-to-months,
#                  so it doesn't belong on the 2-min cadence).
[triggers]
crons = ["*/2 * * * *", "0 3 * * *"]

[vars]
# Agent LLM configuration. Agents always perform real work: unpinned
# blocks/agents default to the Qwen model from the picker catalog (its Cloudflare
# Workers AI flavour, or direct DashScope when QWEN_API_KEY is configured).
# Uncomment to pin a specific provider/model:
# AGENT_DEFAULT_PROVIDER = "workers-ai"
# AGENT_DEFAULT_MODEL = "@cf/qwen/qwen3-30b-a3b-fp8"
# How long a run may park on a human decision before expiring:
DECISION_TIMEOUT = "24 hours"

# Web search (optional; off by default). Keys stay on the backend — never in the
# per-run container: container agents reach search through this Worker's proxy at
# ${WORKER_PUBLIC_URL}/v1/web-search with their session token.
#  - Container agents (coder/ci-fixer/…): the search-upstream keys (Brave key, or a
#    self-hosted SearXNG url [+ key]) are now configured PER ACCOUNT in the UI (account
#    Deployment settings, admin only) and sealed in the DB — no longer via env.
#  - Inline architect/researcher (Anthropic/OpenAI models only):
# INLINE_WEB_SEARCH_ENABLED = "true"
# INLINE_WEB_SEARCH_KINDS = "architect,researcher"
# INLINE_WEB_SEARCH_MAX_USES = "5"

# Container-based implementation is always on: the repo-operating steps (`coder`,
# `mocker`, `playwright`, `blueprints`) run in a per-run Pi container that clones
# the repo, implements the block and opens a PR. The container reaches the LLM only
# via this Worker's proxy at ${WORKER_PUBLIC_URL}/v1, so no provider key enters the
# image. Its prerequisites — a GitHub App, WORKER_PUBLIC_URL, AUTH_SESSION_SECRET
# and a runner backend (the EXEC_CONTAINER binding above or a registered runner
# pool) — are mandatory; the Worker fails to start if any is missing.
# Public origin of this Worker; required for container implementation and repo
# bootstrap. MUST be the workers.dev origin, NOT an orange-clouded custom domain:
# a per-run Container egresses from inside Cloudflare's network, and a zone's
# WAF/Bot-Fight rules block its POSTs to the proxy with "403 ... blocked." before
# the Worker ever runs (browsers pass the bot checks, so the SPA is unaffected).
# workers.dev is not in that zone, so the container reaches the proxy unblocked.
WORKER_PUBLIC_URL = "https://cat-factory-backend.iselwin.workers.dev"
# Container coding jobs run asynchronously: the driver dispatches the job and
# then polls it on this cadence between durable sleeps. JOB_MAX_POLLS is a
# backstop in case a container never reports a terminal state.
# JOB_POLL_INTERVAL = "15 seconds"
# JOB_MAX_POLLS = "280"
# The container-side watchdogs that bound every coding job live on the container
# (read by the harness): JOB_MAX_DURATION_MS force-fails a job after this long
# (default 3600000 = 60 min); JOB_INACTIVITY_MS kills the agent if it produces no
# output for this long (default 600000 = 10 min).
# Instance-level container reaper (cron backstop): SIGKILLs any per-run container
# whose first dispatch is older than this many minutes — the net for a container the
# run record can no longer reach. Default 90, hard-clamped to >=75 so a low value
# can't reap live work (the longest legitimate lifetime is ~70 min).
# CONTAINER_MAX_AGE_MINUTES = "90"

# Spend safeguard. Token usage is metered per LLM call into a ledger, priced, and gated
# by a monthly budget; when reached, runs pause and the frontend shows a warning. The
# budget (currency, monthly limit, per-model price overrides) is now configured PER
# WORKSPACE in the UI (Workspace settings → Budget) and persisted in the DB, not via env.
# A workspace with no budget set inherits the built-in default (~100 EUR/month).

# Per-block model picker. Every model runs on the Workers AI binding above by
# default; setting a provider key below switches that model to its direct API
# instead (Llama has no direct variant). Set the keys as secrets:
#   wrangler secret put QWEN_API_KEY       # Qwen → Alibaba DashScope (intl endpoint)
#   wrangler secret put DEEPSEEK_API_KEY   # DeepSeek → DeepSeek API
#   wrangler secret put MOONSHOT_API_KEY   # Kimi → Moonshot AI
#
# OpenRouter + LiteLLM (OpenAI-compatible gateways): their API keys are added per
# workspace/user via the UI (Settings → Direct provider API keys), NOT as secrets here.
# Only the base URLs are deployment config — OpenRouter defaults to the public gateway,
# LiteLLM is operator-hosted so LITELLM_BASE_URL is REQUIRED to enable it.
# OPENROUTER_BASE_URL = "https://openrouter.ai/api/v1"
# LITELLM_BASE_URL = "https://litellm.internal.example.com/v1"

# Storage retention. The cron sweeper prunes the tables that don't self-limit to
# these age windows (in days); 0 disables a table's pass. Defaults are applied
# when unset, so these are shown only for visibility/tuning.
# TOKEN_USAGE_RETENTION_DAYS = "395"
# GITHUB_RATE_LIMIT_RETENTION_DAYS = "7"
# GITHUB_COMMIT_RETENTION_DAYS = "90"

# LLM observability. The proxy records one metric per container-agent model call.
# By default each metric keeps the complete prompt sent to the model; set this to
# "false" to drop the prompt body (the numeric telemetry — tokens, timing, finish
# reason, counts — is still recorded) for deployments that must not retain prompt text.
# LLM_RECORD_PROMPTS = "false"

# Langfuse trace sink (opt-in). Streams every LLM call — container-agent calls (via the
# proxy) AND inline calls (requirements review, doc planner, fragment selector) — to
# Langfuse as a generation grouped under its run's trace, via Langfuse's fetch-based
# ingestion API (so it runs on the Worker). Off unless LANGFUSE_ENABLED = "true" and
# both keys are set; honours LLM_RECORD_PROMPTS. Set the secret key as a Worker secret:
#   wrangler secret put LANGFUSE_SECRET_KEY
# LANGFUSE_ENABLED = "true"
# LANGFUSE_PUBLIC_KEY = "pk-lf-..."
# LANGFUSE_BASE_URL = "https://cloud.langfuse.com"

# GitHub App integration. Off until an App is configured: set the App id/slug here
# and the private key (PKCS#8 PEM) + webhook secret as secrets:
#   wrangler secret put GITHUB_APP_PRIVATE_KEY
#   wrangler secret put GITHUB_WEBHOOK_SECRET
GITHUB_APP_ID = "4067384"
GITHUB_APP_SLUG = "cat-factory-app"
GITHUB_API_BASE = "https://api.github.com"
# Where to send the browser after a successful install:
GITHUB_SETUP_REDIRECT_URL = "https://catfactory.kiberion.com"

# "Login with GitHub". REQUIRED in production: the auth gate fails closed, so
# until an OAuth app is configured the protected API returns 503. Set the client
# id here and the secrets via
#   wrangler secret put GITHUB_OAUTH_CLIENT_SECRET
#   wrangler secret put AUTH_SESSION_SECRET   # any high-entropy random string
# Register the callback URL as <worker-origin>/auth/callback. (Local dev/tests
# run open via AUTH_DEV_OPEN=true in .dev.vars — NEVER set that here.)
GITHUB_OAUTH_CLIENT_ID = "Iv23liSy37MggMK0afZL"
# Fixed SPA landing URL after login (strongly recommended in production):
AUTH_SUCCESS_REDIRECT_URL = "https://catfactory.kiberion.com"
# Deployment-environment marker. When production-like, the worker REFUSES the
# AUTH_DEV_OPEN escape hatch even if it leaks in — belt-and-braces so a stray dev
# flag can't re-open a live deployment. Always set this in a real deployment.
ENVIRONMENT = "production"
# Session lifetime in hours (default 168 = 7 days):
# AUTH_SESSION_TTL_HOURS = "168"
#
# Sign-in allowlist (fail closed). Login is restricted to the GitHub users named
# in AUTH_ALLOWED_LOGINS OR the members of the organizations named in
# AUTH_ALLOWED_ORGS — the two lists combine as an OR. Both empty => NOBODY can
# sign in. At least one MUST be set or the deployment locks everyone out.
AUTH_ALLOWED_LOGINS = "kibertoad"
# AUTH_ALLOWED_ORGS = "my-org,another-org"

# CORS allowlist. Comma-separated browser Origins the API answers cross-origin —
# set this to YOUR frontend origin(s) when provisioning. Unset or "*" allows any
# origin, which is safe because every route is bearer-gated and fails closed;
# pinning is defense-in-depth. No trailing slash.
CORS_ALLOWED_ORIGINS = "https://catfactory.kiberion.com"

# Credential encryption. ONE shared master key (a secret) encrypts every integration's
# per-workspace credentials at rest — documents, tasks, environments and runner pools.
# The cipher domain-separates per integration internally, so a single key is safe:
#   openssl rand -base64 32 | wrangler secret put ENCRYPTION_KEY

# Document-source integration. ALWAYS ON — workspaces connect Confluence/Notion/… for
# requirements/RFCs/PRDs through the app, and per-workspace credentials are stored
# ENCRYPTED in D1. REQUIRES the ENCRYPTION_KEY above; the worker fails to boot (loud
# config error) without it.
DOCUMENT_SOURCES = "confluence,notion"
DOCUMENT_PLANNER = "llm"

# Task-source integration. ALWAYS ON — workspaces connect a tracker (Jira, …) through
# the app to link individual issues to a board block as extra agent context, and toggle
# each source (Jira / GitHub Issues) on or off per workspace in the UI (there is no
# deployment-level source allow-list). Per-workspace credentials are stored ENCRYPTED in
# D1. REQUIRES the ENCRYPTION_KEY above; the worker fails to boot without it.

# Ephemeral environment provider integration. It is always available (assembled from the
# shared ENCRYPTION_KEY above, which seals its secrets); a workspace registers its own
# self-rolled environment management API so a `deployer` agent can provision ephemeral
# environments a `tester` then runs against. Nothing provisions until a workspace connects
# a provider and its pipeline includes a `deployer`/`tester` step — to keep environments out
# of a pipeline entirely, just omit those steps.
# Trusted-operator escape hatch: let the env management API / returned env URL live on
# an internal/VPN host (otherwise the strict public-https SSRF guard rejects it). Each
# host matches exactly or as a dot suffix when it starts with `.` (`.internal`). Leave
# unset for the strict default. See backend/docs/environments-integration.md.
# ENVIRONMENTS_ALLOW_URL_HOSTS = "envs.corp.internal,.preview.internal"
# ENVIRONMENTS_ALLOW_HTTP_URLS = "false"

# Self-hosted runner pool — "bring your own infra". Off by default. Turn it on to
# let a workspace register its OWN container runner pool and run the repo-operating
# coding jobs there instead of per-run Cloudflare Containers. When on, a registered
# pool can stand in for the EXEC_CONTAINER binding as the mandatory runner backend.
# Its scheduler secrets are sealed with the shared ENCRYPTION_KEY above.
RUNNERS_ENABLED = "false"
# Trusted-operator escape hatch: let the pool scheduler API live on an internal/VPN host.
# Scoped independently of ENVIRONMENTS_ALLOW_* (a host allowed here is NOT reachable by the
# env provider). Leave unset for the strict public-https default.
# See backend/docs/runner-pool-integration.md §6.
# RUNNERS_ALLOW_URL_HOSTS = "pool.corp.internal"
# RUNNERS_ALLOW_HTTP_URLS = "false"

# Datadog post-release-health gate. Off by default. Turn it on to let the
# `post-release-health` pipeline step watch a workspace's configured Datadog
# monitors/SLOs after a release ships; on a regression an on-call agent investigates
# (a human decides whether to revert). Per-workspace API/app keys are connected in the
# UI and sealed with the shared ENCRYPTION_KEY above. Optional incident enrichment
# (PagerDuty / incident.io) credentials are now configured PER WORKSPACE in the UI
# (sealed in the DB), not via env: the on-call investigation is posted onto an incident
# those systems ALREADY opened from the same monitors/SLOs (annotate, never re-alert).
OBSERVABILITY_ENABLED = "false"
