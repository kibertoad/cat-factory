name: Release

# Changesets-driven release. On every push to main this either opens/updates a
# "Release Packages" PR (collecting the pending changesets into version bumps +
# changelogs) or, when that PR has been merged, publishes the public packages to
# npm. Private packages (the deploy/* examples, benchmark-harness, and the
# executor-harness) are versioned but not published; the runner image is
# published separately by docker-publish.yml.

on:
  push:
    branches: [main]
    # A docs-only merge must NOT trigger the publish flow — publishing a package
    # whose only change is prose it doesn't ship is pointless. The exception is
    # README files: those ARE shipped in the npm tarball, so a README change
    # SHOULD republish. Semantics: a push runs the workflow only if at least one
    # changed file matches a positive pattern after the negations — last match
    # wins per file, so a lone doc excludes itself while any code file (matched by
    # '**') or a README re-includes.
    #
    # Note we deliberately do NOT re-include `.changeset/**`: a docs-only PR ships
    # an (empty) changeset per repo convention, so treating changeset files as
    # non-triggering is exactly what keeps this gate from being defeated by that
    # accompanying `.changeset/*.md`. Changesets don't need to trigger the run
    # anyway — the Release PR opens/updates when the code change they ride with
    # lands ('**'), and the actual publish fires when the Release PR merges (a
    # non-doc `package.json` version bump → '**'). Empty changesets that land on a
    # docs-only merge are simply consumed (no bump) by the next real release run.
    paths:
      - '**'
      - '!**/*.md'
      - '!docs/**'
      - '!backend/docs/**'
      # README ships in the published package tarball — republish on a change.
      - 'README.md'
      - '**/README.md'
  workflow_dispatch:

# Don't cancel an in-flight publish.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  release:
    name: Version / publish
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the Release PR + push tags
      pull-requests: write # open/update the Release PR
      id-token: write # npm OIDC trusted publishing + provenance
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # changesets/action needs push credentials to create/update the Release
          # PR branch; this is the one job that legitimately persists them.
          persist-credentials: true # zizmor: ignore[artipacked]
          # Use a PAT, not the default GITHUB_TOKEN: pushes/merges made with the
          # default token do NOT trigger further workflow runs (GitHub's
          # anti-recursion rule), so merging the Release PR with GITHUB_TOKEN
          # left the publish job un-triggered. A PAT-attributed merge re-runs
          # this workflow, which then publishes (no pending changesets => publish
          # mode). Falls back to GITHUB_TOKEN if the secret is unset.
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create Release PR or publish
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          # Run the root `version` npm script, NOT the action's default (which is a
          # bare `changeset version`). The action does NOT pick up the package.json
          # `version` script on its own, so without this input the post-bump
          # `scripts/sync-runner-image-tags.mjs` never runs and the Release PR is born
          # with runner-image tag drift (harness bumped, deploy pins left behind) that
          # red-fails the "Guard runner image tag" check. Naming the script here is
          # what wires the auto-sync into every Release PR.
          version: pnpm run version
          # Builds every publishable package then runs `changeset publish`.
          publish: pnpm ci:publish
          title: 'Release Packages'
          commit: 'chore: release packages'
        env:
          # PAT so the Release PR it creates is authored by a real identity whose
          # later merge re-triggers this workflow's publish job (see checkout above).
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          # No NPM_TOKEN: publishing authenticates via npm OIDC trusted
          # publishing (the `id-token: write` permission above). Configure each
          # package's trusted publisher on npmjs.com to point at this workflow.
          # Provenance is attested automatically from the same OIDC identity.
          NPM_CONFIG_PROVENANCE: 'true'

      # Let the Release PR merge itself once required checks pass, so the
      # version bump + publish run hands-off. Requires repo auto-merge enabled
      # and a required status check on `main` (otherwise `--auto` is rejected).
      - name: Enable auto-merge on the Release PR
        if: steps.changesets.outputs.pullRequestNumber != ''
        run: gh pr merge --auto --squash "$PR_NUMBER"
        env:
          # PAT here too: the auto-merge must be attributed to the PAT identity so
          # the merge push triggers the publish run. With GITHUB_TOKEN it merges
          # but the merge is a no-op for Actions and nothing publishes.
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.changesets.outputs.pullRequestNumber }}
