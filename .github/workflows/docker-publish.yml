name: Docker publish (runner image)

# Publishes the executor-harness (Pi coding-agent) runner image to public
# registries (GHCR + Docker Hub) as a multi-arch (amd64 + arm64) image so anyone
# can `docker pull` it instead of building the Dockerfile locally, e.g. reference
# it from a backend deployment's wrangler.toml
# (`image = "ghcr.io/<owner>/cat-factory-executor:<tag>"`) or a self-hosted runner
# pool. The manual counterpart is `scripts/publish-image.sh` in the harness package.
#
# Docker Hub publishing is gated on the DOCKERHUB_USERNAME / DOCKERHUB_TOKEN repo
# secrets: when they are absent (e.g. a fork) the image still publishes to GHCR.
#
# GATED on changes that affect what is packaged into the image: only fires when a
# push to main touches the harness sources, the Dockerfile, its tsconfig, or its
# package.json (so a changeset-driven version bump republishes a freshly-tagged
# image). Frontend-only or unrelated backend changes never rebuild it.

on:
  push:
    branches: [main]
    paths:
      - 'backend/internal/executor-harness/src/**'
      - 'backend/internal/executor-harness/Dockerfile'
      - 'backend/internal/executor-harness/tsconfig.json'
      - 'backend/internal/executor-harness/package.json'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/cat-factory-executor
  DOCKERHUB_IMAGE: docker.io/${{ vars.DOCKERHUB_ORG || github.repository_owner }}/cat-factory-executor
  CONTEXT: backend/internal/executor-harness
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  publish:
    name: Build, test & push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to GHCR
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      # The pnpm cache here only speeds up the host-side `pnpm install` for the
      # pre-publish acceptance test; it never feeds the published image (built
      # `no-cache` inside Docker below) and a PR run can't poison main's cache.
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0 # zizmor: ignore[cache-poisoning]
        with:
          node-version: 26
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The acceptance suite imports built workspace packages (@cat-factory/spend,
      # @cat-factory/server) whose package.json exports point at ./dist, which is
      # gitignored. `pnpm install` only symlinks the workspace; it never builds, so
      # without this step vite fails to resolve those entries. The root build is the
      # tsc -b project-reference graph that produces every package's dist.
      - name: Build workspace packages
        run: pnpm build

      # Validate the image end-to-end BEFORE publishing: builds the executor
      # image and drives a full clone → Pi → commit → push → PR against a dummy
      # streaming LLM proxy and a stub GitHub API (no real provider/GitHub).
      - name: Container acceptance tests
        run: pnpm --filter @cat-factory/executor-harness run test:acceptance

      # Docker Hub is optional: publish there only when both secrets are present
      # (the main repo), so a fork without them still publishes to GHCR.
      - name: Resolve config
        id: cfg
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -n "${DOCKERHUB_USERNAME}" ] && [ -n "${DOCKERHUB_TOKEN}" ]; then
            echo "dockerhub=true" >> "$GITHUB_OUTPUT"
          else
            echo "dockerhub=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve image tags
        id: tags
        env:
          # Routed through env (not inlined as ${{ }} in the run block) to avoid
          # template-injection into the shell — zizmor[template-injection].
          DOCKERHUB_ENABLED: ${{ steps.cfg.outputs.dockerhub }}
        run: |
          version="$(node -p "require('./${CONTEXT}/package.json').version")"
          short_sha="${GITHUB_SHA::7}"
          emit() {
            echo "${1}:${version}"
            echo "${1}:sha-${short_sha}"
            echo "${1}:latest"
          }
          {
            echo "tags<<EOF"
            emit "${GHCR_IMAGE}"
            if [ "${DOCKERHUB_ENABLED}" = "true" ]; then
              emit "${DOCKERHUB_IMAGE}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: steps.cfg.outputs.dockerhub == 'true'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # arm64 emulation so the multi-arch build can produce an arm64 layer too.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
        with:
          platforms: arm64

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      # The published image must not be assembled from layers a less-trusted
      # workflow run could have poisoned, so build it fresh (no-cache) here even
      # though the acceptance step already built one locally.
      - name: Build & push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ env.CONTEXT }}
          file: ${{ env.CONTEXT }}/Dockerfile
          platforms: ${{ env.PLATFORMS }}
          push: true
          no-cache: true
          tags: ${{ steps.tags.outputs.tags }}
