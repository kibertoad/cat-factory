name: Docker publish (runner image)

# Publishes the implementer-harness (Pi coding-agent) runner image to GHCR so any
# organization can reference it from their backend deployment's wrangler.toml
# (`image = "ghcr.io/<owner>/cat-factory-implementer:<tag>"`) instead of building
# the Dockerfile locally.
#
# GATED on changes that affect what is packaged into the image: only fires when a
# push to main touches the harness sources, the Dockerfile, its tsconfig, or its
# package.json (so a changeset-driven version bump republishes a freshly-tagged
# image). Frontend-only or unrelated backend changes never rebuild it.

on:
  push:
    branches: [main]
    paths:
      - "backend/packages/implementer-harness/src/**"
      - "backend/packages/implementer-harness/Dockerfile"
      - "backend/packages/implementer-harness/tsconfig.json"
      - "backend/packages/implementer-harness/package.json"
      - ".github/workflows/docker-publish.yml"
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/cat-factory-implementer
  CONTEXT: backend/packages/implementer-harness

jobs:
  publish:
    name: Build, test & push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to GHCR
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Validate the image end-to-end BEFORE publishing: builds the implementer
      # image and drives a full clone → Pi → commit → push → PR against a dummy
      # streaming LLM proxy and a stub GitHub API (no real provider/GitHub).
      - name: Container acceptance tests
        run: pnpm --filter @cat-factory/implementer-harness run test:acceptance

      - name: Resolve image tags
        id: tags
        run: |
          version="$(node -p "require('./${CONTEXT}/package.json').version")"
          short_sha="${GITHUB_SHA::7}"
          {
            echo "tags<<EOF"
            echo "${IMAGE}:${version}"
            echo "${IMAGE}:sha-${short_sha}"
            echo "${IMAGE}:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      # The published image must not be assembled from layers a less-trusted
      # workflow run could have poisoned, so build it fresh (no-cache) here even
      # though the acceptance step already built one locally.
      - name: Build & push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ${{ env.CONTEXT }}
          file: ${{ env.CONTEXT }}/Dockerfile
          push: true
          no-cache: true
          tags: ${{ steps.tags.outputs.tags }}
