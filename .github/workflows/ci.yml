name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default to no privileges; each job opts into exactly what it needs.
permissions: {}

jobs:
  # Detect which parts of the tree changed so expensive jobs can opt out when
  # they are not affected. The container acceptance suite builds and runs the
  # implementer Docker image and only depends on the backend, so a
  # frontend-only change has no reason to pay for it.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          # The acceptance suite builds the implementer image (whose context is
          # just implementer-harness/) and drives it from host-side scaffolding
          # that imports @cat-factory/spend and @cat-factory/worker. Gate on
          # those packages plus kernel (spend's only dep), the root
          # manifests/lockfile (dep or build changes), and this workflow.
          filters: |
            backend:
              - 'backend/internal/implementer-harness/**'
              - 'backend/packages/kernel/**'
              - 'backend/packages/spend/**'
              - 'backend/packages/worker/**'
              - 'backend/tsconfig*.json'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.github/workflows/ci.yml'

  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint & Formatting
        run: pnpm lint

  build-typecheck:
    name: Build & typecheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build the publishable libraries (contracts → prompt-fragments → core →
      # worker, in dependency order). `tsc` emits declarations, so this is also a
      # full typecheck of every library's shippable `src` — the same `dist` the
      # deployments and npm consumers use.
      - name: Build libraries
        run: pnpm build

      # Typecheck the frontend layer's shippable code (the deploy apps have no
      # source of their own, and the libraries are typechecked by the build above).
      - name: Typecheck frontend layer
        run: pnpm --filter @cat-factory/app run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test:run

  acceptance:
    name: Container acceptance (Docker)
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The acceptance scaffolding imports @cat-factory/core and @cat-factory/worker,
      # which now resolve to built `dist`, so build the libraries first.
      - name: Build libraries
        run: pnpm build

      # Builds and launches the implementer Docker image and drives a full
      # clone → Pi → commit → push → PR against a dummy streaming LLM proxy and a
      # stub GitHub API (no real provider/GitHub). The runner has Docker +
      # host-gateway, so the suite runs rather than self-skipping.
      - name: Container acceptance tests
        run: pnpm --filter @cat-factory/implementer-harness run test:acceptance

  changeset:
    name: Changeset present
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Need history back to the base branch so `changeset status` can diff.
          fetch-depth: 0
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Fails when versioned packages changed without an accompanying changeset.
      # For changes that genuinely need no release (docs, CI, tests), add an
      # empty changeset: `pnpm changeset --empty`.
      - name: Verify a changeset exists
        env:
          BASE_REF: ${{ github.base_ref }}
        run: pnpm changeset status --since="origin/${BASE_REF}"

  zizmor:
    name: Zizmor (workflow security)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          # Print findings to the job log and fail on them rather than
          # uploading SARIF, so this works without GitHub Advanced Security.
          advanced-security: false
