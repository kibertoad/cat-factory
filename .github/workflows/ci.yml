name: CI

# Runs on every PR (the full gate suite) and on push to main (post-merge). The two events
# run DIFFERENT subsets, on purpose. Pure PRE-MERGE gates — lint/format, publish integrity,
# the repo guards, changeset presence and workflow security — run ONLY on PRs (+ manual
# dispatch): each is deterministic from the diff's content and none can block an already-
# merged commit, so re-running them on main produces no signal a PR run didn't already give.
# Push to main runs only the checks with genuine POST-MERGE value — build/typecheck (incl.
# the Drizzle migration-lineage check that catches non-commutative merges), the test lanes,
# and container acceptance — which surface integration/merge-race failures that no single
# PR's `pull/<n>/merge` was ever tested against. Each PR-only job carries a
# `github.event_name != 'push'` guard (dispatch still runs them so CI changes are measurable
# on a branch); the `changeset` job predates this and uses the narrower pull_request-only form.

on:
  push:
    branches: [main]
  pull_request:
  # Allow manual runs on any branch so CI changes can be measured before merge.
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default to no privileges; each job opts into exactly what it needs.
permissions: {}

jobs:
  # Detect which parts of the tree changed so expensive jobs can opt out when
  # they are not affected. The container acceptance suite builds and runs the
  # executor Docker image and only depends on the backend, so a
  # frontend-only change has no reason to pay for it.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      kubernetes: ${{ steps.filter.outputs.kubernetes }}
      deployHarness: ${{ steps.filter.outputs.deployHarness }}
      eks: ${{ steps.filter.outputs.eks }}
      # Coarse test-lane gating (computed in the `scope` step below):
      #   backendCode — backend source OR a root build/dependency input changed. Gates the
      #                 pure-backend lanes (`test-worker`, `test-db`); a frontend- or
      #                 docs-only PR leaves it false so those lanes skip.
      #   code        — ANY real source changed (backend, frontend, a `deploy/*` example, or
      #                 a root build input), i.e. NOT a docs-/prose-only diff. Gates the
      #                 cross-stack lanes (`test-units`, `test-e2e`) AND the build lanes
      #                 (`build-typecheck`, `publish-integrity`, `frontend-check`), so a
      #                 docs-only PR runs no tests and no builds — only lint, the repo
      #                 guards, changeset, and zizmor. (On non-PR events both flags are
      #                 forced true — see `scope`.)
      backendCode: ${{ steps.scope.outputs.backendCode }}
      code: ${{ steps.scope.outputs.code }}
      # Shard shape for the sharded test lanes (test-worker / test-db / test-e2e), chosen by
      # event. A push to `main` is post-merge and un-hurried, so it collapses each lane to a
      # SINGLE shard (fewer runner-minutes, higher wall-clock — the intended trade). Every
      # other event (a PR, or a manual workflow_dispatch used to measure sharded timing) keeps
      # the full 3-way split. `shardMatrix` feeds the job `matrix.shard`; `shardTotal` is the
      # `--shard=<i>/<N>` denominator (vitest/playwright accept the degenerate `1/1`).
      shardMatrix: ${{ steps.shards.outputs.matrix }}
      shardTotal: ${{ steps.shards.outputs.total }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          # The acceptance suite builds the executor image (whose context is
          # just executor-harness/) and drives it from host-side scaffolding
          # that imports @cat-factory/spend and @cat-factory/worker. Gate on
          # those packages plus kernel (spend's only dep), the root
          # manifests/lockfile (dep or build changes), and this workflow.
          filters: |
            backend:
              - 'backend/internal/executor-harness/**'
              - 'backend/packages/kernel/**'
              - 'backend/packages/spend/**'
              - 'backend/packages/server/**'
              - 'backend/runtimes/**'
              - 'backend/tsconfig*.json'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.github/workflows/ci.yml'
              - '.github/actions/**'
            # The Kubernetes integration suite (`test-k8s`) spins up a real k3d cluster, so it
            # only runs when code touching the native K8s backends — the adapters/logic, the
            # wire contracts that define their config, or the ports they implement — changes.
            kubernetes:
              - 'backend/packages/integrations/src/modules/kubernetes/**'
              - 'backend/packages/integrations/vitest.integration.config.ts'
              - 'backend/packages/contracts/src/runners.ts'
              - 'backend/packages/contracts/src/environments.ts'
              - 'backend/packages/kernel/src/ports/runner-transport.ts'
              - 'backend/packages/kernel/src/ports/environment-provider.ts'
              # The CLI's guided k3s setup (`cat-factory k3s`) has its own integration suite that
              # provisions against the SAME k3d cluster (`test-k8s`), so changes to its probe /
              # provisioning logic or its integration config run the job too. `host-shell.ts` is
              # included because its real, process-backed `createNodeShell()` is exercised ONLY by
              # this integration suite (every unit test injects a fake shell) — so a change to the
              # spawn/stdin/watchdog logic must run the one test that covers it for real.
              - 'backend/packages/cli/src/k3s*.ts'
              - 'backend/packages/cli/src/host-shell.ts'
              - 'backend/packages/cli/vitest.integration.config.ts'
              - '.github/workflows/ci.yml'
              - '.github/actions/**'
            # The deploy-harness integration suite (also in `test-k8s`) drives `handleDeploy`
            # against the SAME k3d cluster with real kubectl/kustomize, so it only runs when the
            # harness itself changes.
            deployHarness:
              - 'backend/internal/deploy-harness/**'
              - '.github/workflows/ci.yml'
              - '.github/actions/**'
            # The EKS integration suite (`test-eks`) boots a floci-emulated EKS cluster (a real
            # k3s behind the AWS EKS API), so it only runs when the EKS package, the wire
            # contracts that define its config, or the ports it implements change. This job is
            # NON-BLOCKING (not in the aggregated `Test` gate) while floci support settles.
            eks:
              - 'backend/packages/eks/**'
              - 'backend/packages/contracts/src/runners.ts'
              - 'backend/packages/contracts/src/environments.ts'
              - 'backend/packages/contracts/src/primitives.ts'
              - 'backend/packages/integrations/src/modules/kubernetes/**'
              - '.github/workflows/ci.yml'
            # Root build / dependency / CI inputs that can change the outcome of ANY suite:
            # the lockfile, the workspace + root package manifests, the shared tsconfigs, the
            # Turbo task graph, and this workflow (or the composite actions it calls). Any of
            # these forces every lane to run — a dep or build-graph change is never "no-op".
            rootBuild:
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig*.json'
              - 'backend/tsconfig*.json'
              - 'turbo.json'
              - '.github/workflows/ci.yml'
              - '.github/actions/**'

      # A SECOND paths-filter with `predicate-quantifier: every` so each rule set is an AND —
      # which is what makes the `!` exclusions actually SUBTRACT (under the default `some`
      # quantifier a broad `**`-style positive would still match a doc file, defeating the
      # exclusion). It can't share the step above, whose OR-style positive filters rely on
      # `some`. Purpose: decide whether a diff touched real SOURCE, treating markdown/prose as
      # non-code so a docs-only change is genuinely "zero code changes".
      - id: src
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          predicate-quantifier: 'every'
          filters: |
            # Backend source in any package / runtime / internal harness — but NOT markdown
            # or the backend/docs tree, so a backend docs-only edit doesn't drag in the whole
            # backend test matrix.
            backendSrc:
              - 'backend/**'
              - '!**/*.md'
              - '!backend/docs/**'
            # Frontend layer source, likewise minus its markdown docs.
            frontendSrc:
              - 'frontend/**'
              - '!**/*.md'
            # Example deployments (`deploy/*`) — the assembled-product wiring. `test-e2e`
            # builds and serves `deploy/frontend` as its real SPA (Playwright's webServer
            # runs `pnpm --filter @cat-factory/deploy-frontend run build && ... preview`), so a
            # deploy-only change must still run the cross-stack lanes. Kept a SEPARATE filter
            # (not another positive on `frontendSrc`): under `predicate-quantifier: every`
            # multiple positives are AND-ed, so `frontend/**` AND `deploy/**` would match
            # nothing. Markdown excluded so a deploy README edit stays docs-only.
            deploySrc:
              - 'deploy/**'
              - '!**/*.md'

      # Fold the two paths-filter steps into the coarse lane flags the jobs gate on. Kept in a
      # shell step (not inline `if:` expressions) so each job's condition stays a single,
      # readable output reference. Values are our own 'true'/'false' strings passed via env —
      # never interpolated into the script body — so there's no template-injection surface.
      - id: scope
        env:
          BACKEND_SRC: ${{ steps.src.outputs.backendSrc }}
          FRONTEND_SRC: ${{ steps.src.outputs.frontendSrc }}
          DEPLOY_SRC: ${{ steps.src.outputs.deploySrc }}
          ROOT_BUILD: ${{ steps.filter.outputs.rootBuild }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          backend=false
          code=false
          if [ "$BACKEND_SRC" = 'true' ] || [ "$ROOT_BUILD" = 'true' ]; then backend=true; fi
          if [ "$backend" = 'true' ] || [ "$FRONTEND_SRC" = 'true' ] || [ "$DEPLOY_SRC" = 'true' ]; then code=true; fi
          # Change-gating only makes sense against a PR base. On non-PR events (a push to
          # `main`, or a manual `workflow_dispatch`) paths-filter diffs against the default
          # branch, so a dispatch on `main` — HEAD == base tip — yields an EMPTY diff and every
          # filter reads false. Don't let that skip the whole suite green: on any non-PR event
          # run everything, matching the pre-gating behaviour (these lanes had no change gate).
          if [ "$EVENT_NAME" != 'pull_request' ]; then backend=true; code=true; fi
          {
            echo "backendCode=$backend"
            echo "code=$code"
          } >> "$GITHUB_OUTPUT"
          echo "backendCode=$backend | code=$code" \
            "(backendSrc=$BACKEND_SRC frontendSrc=$FRONTEND_SRC deploySrc=$DEPLOY_SRC" \
            "rootBuild=$ROOT_BUILD event=$EVENT_NAME)"

      # Pick the shard shape for the sharded test lanes. Gate on `push` specifically (not
      # "not a PR") so a manual workflow_dispatch — the way CI timing is measured before a
      # change lands — still exercises the real 3-way split; only an actual push to `main`
      # runs everything in one shard. `matrix` is a JSON array the jobs `fromJSON` into their
      # `matrix.shard`; `total` is the `--shard` denominator (`1/1` is the valid "run all" case).
      - id: shards
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = 'push' ]; then
            matrix='[1]'
            total=1
          else
            matrix='[1, 2, 3]'
            total=3
          fi
          {
            echo "matrix=$matrix"
            echo "total=$total"
          } >> "$GITHUB_OUTPUT"
          echo "shardMatrix=$matrix | shardTotal=$total (event=$EVENT_NAME)"

  lint:
    name: Lint & format
    # PR-ONLY pre-merge gate: oxlint/oxfmt are deterministic per file and sherif checks
    # cross-package manifest consistency — none of it yields a post-merge signal a PR run
    # didn't already give (and a merge race that drifted a dep version would also break the
    # build/test lanes that DO run on main), so this doesn't run on push to main.
    # Also skip on the Changesets "Release Packages" PR: its diff is bot-generated
    # CHANGELOG.md entries + version bumps, which we don't author or gate on oxfmt, and lint
    # is not a required check anyway. Mirrors the `changeset` job's skip below.
    if: ${{ github.event_name != 'push' && github.head_ref != 'changeset-release/main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup pnpm + Node + install
        uses: ./.github/actions/setup

      - name: Lint & Formatting
        run: pnpm lint

      # Monorepo manifest lint: mismatched dependency versions across packages,
      # missing/duplicate fields. Ignores: `typescript` (backend is on the 7.x RC
      # while frontend/app stays on 6.x for vue-tsc) and `@types/node` (the
      # image-feeding harnesses pin ^26.0.0 and their deps are only bumped in
      # deliberate image-tag-bumping changes, never in a tooling sweep).
      - name: Monorepo lint (sherif)
        run: pnpm lint:monorepo

  # The two pure-node repo guards (no install needed) used to open the `build-typecheck`
  # job. They live in their OWN job so that change-gating the build lanes on `code` (below)
  # cannot take them along: both are exactly the checks a docs-/markdown-only PR is most
  # likely to trip — the package catalog IS README.md content, and the image-tag consistency
  # check reads the pinned tag files — so they must run on every PR regardless of scope.
  # But they are PURE PRE-MERGE GATES with no post-merge signal (both deterministic from
  # content, and deploy.yml re-runs the image-tag check on main anyway), so they do NOT run
  # on push to main. On a PR the `Build` gate accepts nothing but `success` from this job; on
  # push it is skipped and the gate tolerates that (see `build-gate`).
  repo-guards:
    name: Repo guards
    # PR-only pre-merge gate (see the block comment above): skipped on push to main.
    if: ${{ github.event_name != 'push' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history so the runner-image-tag guard can diff against the PR base
          # (origin/${{ github.base_ref }}) and read the base's wrangler.toml.
          fetch-depth: 0
          persist-credentials: false

      # Guard the executor-harness runner image tag: the harness version and the
      # cat-factory-executor:<tag> pins in deploy/backend/{package.json, wrangler.toml} must
      # stay in lockstep, and an image-source change must bump the tag. deploy.yml runs the
      # same check post-merge on main; this catches the mistake on the PR instead of turning
      # main red. BASE_REF is empty off PRs (push/dispatch) → the script runs the
      # consistency check only. Pure node + git; no install needed.
      - name: Guard runner image tag
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [ -n "$BASE_REF" ]; then
            node scripts/check-runner-image-tag.mjs --since "origin/${BASE_REF}"
          else
            node scripts/check-runner-image-tag.mjs
          fi

      # Guard the human/LLM-facing package map: every workspace package must have a
      # package.json description AND a row in the README repository-layout tables, so a new
      # package can't become invisible to the docs an LLM reads first. Pure node; no install.
      - name: Guard package catalog
        run: node scripts/check-package-catalog.mjs

  # The former monolithic "Build & typecheck" job was one long SERIAL chain (build →
  # publint/attw → knip → typechecks → nuxt generate → drizzle) and, at ~3m, a co-critical
  # blocking path. It is split into three lanes that run in PARALLEL — `build-typecheck`
  # (core), `publish-integrity`, and `frontend-check` — each of which needs the built `dist/`
  # so each does its own Turbo-cached `pnpm build` (the builds can't be shared within a run:
  # every lane starts at once). All three lanes are change-gated on the coarse `code` flag:
  # nothing in them reads prose, so a docs-only PR skips them (the pure-node guards that DO
  # read markdown live in the always-on `repo-guards` job above). The `build-gate` job below
  # aggregates them into a single required status, mirroring the `Test` gate, so branch
  # protection requires one "Build" check regardless of how the lanes are later re-sliced.
  build-typecheck:
    name: Build & typecheck
    needs: changes
    # Build/typecheck outcomes can only change when real source (or a root build input)
    # changed — a docs-only PR skips the lane and the `Build` gate treats the skip as a pass.
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup pnpm + Node + install
        uses: ./.github/actions/setup
        with:
          turbo-cache: 'true'

      # Build the publishable libraries (contracts → prompt-fragments → core →
      # worker, in dependency order). `tsc` emits declarations, so this is also a
      # full typecheck of every library's shippable `src` — the same `dist` the
      # deployments and npm consumers use.
      - name: Build libraries
        run: pnpm build

      # The internal harnesses (executor-harness, benchmark-harness) are NOT in the
      # `backend/tsconfig.build.json` project-reference graph, so `pnpm build` above
      # never typechecks them — a type error in the harness `src` used to surface only
      # in the much later "Container acceptance (Docker)" job (its `tsc` is the first
      # to compile the harness). Typecheck them here so that class of error fails in
      # this fast lane instead.
      - name: Typecheck internal harnesses
        run: |
          pnpm --filter @cat-factory/executor-harness run typecheck
          pnpm --filter @cat-factory/benchmark-harness run typecheck

      # Verify the Node facade's Drizzle migration lineage stays consistent with
      # `schema.ts`: no forked/non-commutative history and no un-generated drift
      # (an edited schema without its `pnpm db:generate` migration). Offline — a
      # pure snapshot diff, no database needed.
      - name: Check Drizzle migrations
        run: pnpm --filter @cat-factory/node-server run db:check

  # Publish-integrity lane (split out of build-typecheck so its intrinsic ~1min doesn't sit on
  # the serial critical path). Needs the built dist/ (publint packs each package's output).
  # PR-ONLY: this is a pure pre-merge gate — publint/attw/knip catch a broken publish artifact
  # (empty-shell dist/, broken exports map, unused code) BEFORE it lands, and the real publish
  # (release.yml) does its own fresh build + prepublishOnly. Re-running it on push to main gives
  # no new signal (deterministic from content, and it can't un-merge the commit), so it is
  # skipped there.
  publish-integrity:
    name: Publish integrity
    needs: changes
    # publint/attw/knip all analyse built output and source imports — meaningless on a
    # docs-only diff, so this lane change-gates exactly like build-typecheck. And, being a
    # pre-merge gate, it is skipped on push to main (github.event_name != 'push').
    if: ${{ github.event_name != 'push' && needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup pnpm + Node + install
        uses: ./.github/actions/setup
        with:
          turbo-cache: 'true'

      - name: Build libraries
        run: pnpm build

      # Publish-integrity backstop: publint + attw over every publishable package's packed
      # output, so an empty-shell publish (dist/ missing — the @cat-factory/gitlab /
      # provider-s3 incident; prepublishOnly is the other guard) or a broken exports map
      # fails the PR instead of the npm consumer. Needs the dist/ built above.
      - name: Check publish integrity (publint + attw)
        run: pnpm check:publish

      # OpenAPI drift guard: regenerate the public `/api/v1` spec from the Valibot contracts
      # and diff it against the committed docs/openapi.json. Fails if a public contract changed
      # without running `pnpm gen:openapi`. Needs the contracts dist built above.
      - name: Check OpenAPI spec is up to date
        run: pnpm check:openapi

      # Unused files / exports / dependencies across the workspace. The knip.json config is
      # scoped to pass today (see its comments for deliberate ignores); tightening the
      # baseline is tracked separately. Runs after the build because workspace packages
      # resolve each other through their exports maps into the gitignored dist/.
      - name: Knip (unused code & deps)
        run: pnpm lint:knip

  # Frontend lane (typecheck + i18n guards + the real SPA compile), split out of
  # build-typecheck. Needs fetch-depth 0 for the i18n locale-parity base diff, and the built
  # dist/ (the frontend layer imports the built libraries).
  frontend-check:
    name: Frontend checks
    needs: changes
    # The i18n catalogs are .json (never matched by the docs filter) and everything else
    # here compiles source, so a docs-only diff cannot affect this lane; change-gates like
    # the other build lanes.
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history so the i18n locale-parity guard can diff against the PR base.
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm + Node + install
        uses: ./.github/actions/setup
        with:
          turbo-cache: 'true'

      - name: Build libraries
        run: pnpm build

      # Typecheck the frontend layer's shippable code (the deploy apps have no
      # source of their own, and the libraries are typechecked by the build above).
      - name: Typecheck frontend layer
        run: pnpm --filter @cat-factory/app run typecheck

      # i18n drift guard (tier 3): fail if a `t('…')` references a key absent from the
      # catalog. Complements the typed-message-keys typecheck above (tier 1), which can't
      # see a runtime-built key. Unused keys are reported but non-blocking — see the
      # script header and CLAUDE.md → Internationalization.
      - name: Check i18n keys
        run: pnpm --filter @cat-factory/app run i18n:check

      # i18n locale-parity guard: a PR that changes an `en.json` message key must change the
      # SAME key in every other locale too, so translations don't silently go stale. Change-
      # coupling against the PR base (only the keys THIS PR touched in `en` are enforced), so it
      # doesn't fight the pre-existing incremental-translation lag. BASE_REF is empty off PRs
      # (push/dispatch) → the script prints a notice and passes.
      - name: Check i18n locale parity
        if: ${{ github.base_ref != '' }}
        env:
          BASE_REF: ${{ github.base_ref }}
        run: node frontend/app/scripts/i18n-locale-parity.mjs --since "origin/${BASE_REF}"

      # Actually COMPILE the SPA. `vue-tsc` (above) is lenient about template-expression
      # syntax, so an SFC that the real Vue/Vite build rejects (e.g. a multi-statement
      # inline handler) used to slip through every check — nothing in CI built the
      # frontend. We run `nuxt generate` (not `nuxt build`) so this mirrors the EXACT
      # command the Pages deployment ships with, catching `generate`-only failures too.
      # This is NOT redundant with the typecheck above: `nuxt generate` runs no type-checking
      # (no `typeCheck: true` in nuxt.config) and the two catch disjoint error classes.
      # NUXT_PUBLIC_API_BASE is baked in at build time; a placeholder is fine for a pure
      # compile check.
      - name: Build frontend SPA
        run: pnpm --filter @cat-factory/deploy-frontend run generate
        env:
          NUXT_PUBLIC_API_BASE: http://localhost:8787

  # Single aggregated status named "Build" so branch protection can require one check
  # regardless of how the build/typecheck lanes above are sliced. Mirrors the `Test` gate:
  # the three build lanes are change-gated on `code`, so `skipped` is a legitimate result on
  # a docs-only PR — but only when the `changes` job itself succeeded (a failed detection
  # job would skip every lane on empty outputs and pass this gate with nothing built — the
  # same fail-open hole `test-gate` closes). `repo-guards` and `publish-integrity` are
  # PR-only pre-merge gates (they don't run on push to main): on a pull_request the gate
  # demands `success` from `repo-guards` (it is never change-gated there, so a skip means
  # something went wrong), while on push both are legitimately `skipped` and tolerated.
  build-gate:
    name: Build
    needs: [changes, repo-guards, build-typecheck, publish-integrity, frontend-check]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    steps:
      - name: Verify all build lanes passed (or were correctly skipped)
        env:
          EVENT: ${{ github.event_name }}
          CHANGES: ${{ needs.changes.result }}
          GUARDS: ${{ needs.repo-guards.result }}
          CORE: ${{ needs.build-typecheck.result }}
          PUBLISH: ${{ needs.publish-integrity.result }}
          FRONTEND: ${{ needs.frontend-check.result }}
        run: |
          echo "event: $EVENT | changes: $CHANGES | repo-guards: $GUARDS" \
            "| build-typecheck: $CORE | publish-integrity: $PUBLISH | frontend-check: $FRONTEND"
          if [ "$CHANGES" != 'success' ]; then
            echo "::error::change detection did not succeed; refusing to pass the build gate"
            exit 1
          fi
          # repo-guards is a PR-only gate: on a pull_request it must have run and passed (it
          # is never change-gated); on push/dispatch to main it is skipped by design.
          if [ "$EVENT" = 'pull_request' ]; then
            if [ "$GUARDS" != 'success' ]; then
              echo "::error::the repo-guards job reported '$GUARDS' on a PR"
              exit 1
            fi
          elif [ "$GUARDS" != 'success' ] && [ "$GUARDS" != 'skipped' ]; then
            echo "::error::the repo-guards job reported '$GUARDS'"
            exit 1
          fi
          for lane in "$CORE" "$PUBLISH" "$FRONTEND"; do
            case "$lane" in
              success | skipped) ;;
              *)
                echo "::error::a required build lane reported '$lane'"
                exit 1
                ;;
            esac
          done
          echo "All build lanes passed or were skipped with no relevant changes."

  # The Cloudflare worker suite (58 files) is the dominant test cost, and its
  # per-file overhead is intrinsic pool-workers isolate setup — embarrassingly
  # parallel across jobs but not within one. Split it into 3 shards via vitest
  # --shard (deterministic file partition); each shard runs in its own miniflare
  # local D1, so there is no cross-shard contention. No Postgres here — the
  # worker uses a local D1 inside the Workers pool. (3 shards, matching test-e2e:
  # each shard's ~90s run at /2 dropped this lane onto the blocking critical path,
  # so a third shard keeps the per-shard wall-clock bounded.)
  test-worker:
    name: Test worker (shard ${{ matrix.shard }})
    needs: changes
    # Pure-backend lane: the Cloudflare worker facade never imports the frontend, so a
    # frontend-only or docs-only PR has nothing here to test and skips (the `Test` gate
    # treats that skip as a pass).
    if: ${{ needs.changes.outputs.backendCode == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # 3-way split on PRs / dispatch, collapsed to a single shard on push to main.
        shard: ${{ fromJSON(needs.changes.outputs.shardMatrix) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup pnpm + Node + install
        uses: ./.github/actions/setup
        with:
          turbo-cache: 'true'

      # Per-package tests resolve workspace deps against built dist, so build first.
      - name: Build libraries
        run: pnpm build

      # Pass the shard index + denominator via env (not inline `${{ }}` in the script body),
      # so there's no template-injection surface — matching the `scope`/`shards` steps.
      - name: Run worker shard
        env:
          SHARD: ${{ matrix.shard }}
          SHARD_TOTAL: ${{ needs.changes.outputs.shardTotal }}
        run: pnpm --filter @cat-factory/worker exec vitest run --shard="$SHARD/$SHARD_TOTAL"

  # Every non-worker package that needs NO database: the pure-unit suites
  # (orchestration, integrations, server, agents, gates, …) plus the frontend layer.
  # Split out from the Postgres suites so they run at full file parallelism without
  # paying the database's ~20s init or sharing its lane.
  test-units:
    name: Test units (no DB)
    needs: changes
    # Cross-stack lane: this runs every non-facade package's unit suite, which spans the
    # backend shared packages AND the frontend layer — so it runs whenever ANY real source
    # changed, and skips only on a docs-/prose-only PR (nothing to test).
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup pnpm + Node + install
        uses: ./.github/actions/setup
        with:
          turbo-cache: 'true'

      - name: Build libraries
        run: pnpm build

      # Exclude the worker (its own sharded job) and the two Postgres facades (the
      # test-db job below). Everything left is database-free pure-unit work.
      - name: Run unit packages
        run: >-
          pnpm
          --filter='!@cat-factory/worker'
          --filter='!@cat-factory/node-server'
          --filter='!@cat-factory/local-server'
          -r run test:run

  # The Postgres-backed conformance + integration suites (Node + Local facades) — the
  # only tests that need a database. Each vitest worker gets its OWN database
  # (per-worker isolation in the test harness), so these now run with file parallelism;
  # the conformance suite is split into per-group spec files that fan out across workers.
  test-db:
    name: Test DB (node/local) (shard ${{ matrix.shard }})
    needs: changes
    # Pure-backend lane (Node + Local Postgres facades): skips on a frontend-only or
    # docs-only PR, exactly like `test-worker`.
    if: ${{ needs.changes.outputs.backendCode == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    # SHARDED across 3 jobs via vitest's --shard (deterministic file partition), mirroring the
    # `test-worker` / `test-e2e` sharding. The Postgres-backed lane grew when the mothership-mode
    # conformance config was added (the local suite now also runs the shared suite against a
    # remote-RPC backend); 3 shards keep this lane off the blocking-path pole (each shard runs
    # node-server then local-server sequentially, so its test step is the sum of both slices).
    # Each shard is its own job, so the Postgres container below is started per shard — a fresh,
    # private datastore each — and the harness still gives each vitest worker its own database
    # within a shard.
    strategy:
      fail-fast: false
      matrix:
        # 3-way split on PRs / dispatch, collapsed to a single shard on push to main.
        shard: ${{ fromJSON(needs.changes.outputs.shardMatrix) }}
    env:
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/cat_factory_test
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Start Postgres in the BACKGROUND instead of a `services:` container: the service
      # block's image pull + health check ran serially before the job's first step (~20s),
      # whereas backgrounding it here hides that entirely behind setup + build. The
      # readiness wait below gates the test step. Fully job-private, exactly like the
      # service container was (each shard is its own runner VM).
      - name: Start Postgres (background)
        run: |
          nohup bash -c 'docker run -d --name ci-postgres \
            -e POSTGRES_USER=postgres -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=cat_factory_test \
            -p 5432:5432 postgres:18' > "$RUNNER_TEMP/postgres-start.log" 2>&1 &

      - name: Setup pnpm + Node + install
        uses: ./.github/actions/setup
        with:
          turbo-cache: 'true'

      - name: Build libraries
        run: pnpm build

      # Probe over TCP (-h 127.0.0.1) rather than the default unix socket: postgres's init
      # sequence runs a temporary socket-only server, so a socket probe reports ready
      # during init and races the real server's restart; TCP only answers once the final
      # server is up. `docker exec` simply fails while the image is still pulling — the
      # loop tolerates that.
      - name: Wait for Postgres
        run: |
          for _ in $(seq 1 90); do
            if docker exec ci-postgres pg_isready -h 127.0.0.1 -U postgres >/dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done
          cat "$RUNNER_TEMP/postgres-start.log" || true
          docker logs ci-postgres || true
          echo "::error::Postgres did not become ready"
          exit 1

      # Node + Local share this one Postgres server; the harness gives each vitest worker
      # its own database (`<base>_node_<id>` / `<base>_local_<id>` / `<base>_mship_<id>`), so the
      # two facades, the mothership-mode config, and their parallel workers never collide. Each
      # package's spec files are partitioned across the shards by vitest's --shard.
      # Shard index + denominator via env — no inline `${{ }}` in the script body (see the
      # worker lane's note): keeps this off zizmor's template-injection radar.
      - name: Run Postgres-backed suites (shard ${{ matrix.shard }}/${{ needs.changes.outputs.shardTotal }})
        env:
          SHARD: ${{ matrix.shard }}
          SHARD_TOTAL: ${{ needs.changes.outputs.shardTotal }}
        run: |
          pnpm --filter @cat-factory/node-server exec vitest run --shard="$SHARD/$SHARD_TOTAL"
          pnpm --filter @cat-factory/local-server exec vitest run --shard="$SHARD/$SHARD_TOTAL"

  # Playwright e2e: the real SPA against a real Node backend (real Postgres + real
  # WebSocket) with only the external deps faked (see backend/internal/e2e). Needs the
  # same Postgres service as the Node suite; Playwright's own webServer boots both the
  # backend (src/testServer.ts) and the SPA (deploy/frontend's nuxt dev). Covers
  # frontend + backend, so it is gated only on the coarse `code` flag (any real source,
  # frontend OR backend) — it still runs on every code PR, but a docs-only diff skips it.
  #
  # NON-BLOCKING: deliberately NOT a dependency of the aggregated `Test` gate below, so a
  # browser/boot flake here can't block an otherwise-green PR. It still runs on every PR
  # and uploads its report; treat red runs as a signal to investigate, not a merge stop.
  # A flaky test (failed then passed on retry) DOES turn the shard red — the Playwright
  # config sets `failOnFlakyTests`, so a hidden first-attempt failure surfaces as a red
  # check instead of a green one — but, being out of `test-gate.needs`, it still doesn't
  # block the merge. Promote it into `test-gate.needs` once it has proven stable.
  #
  # SHARDED across 3 jobs via Playwright's --shard (deterministic file partition), mirroring
  # the `test-worker` vitest sharding above. Each shard is its own job, so the Postgres
  # container below is started per shard — every shard gets a fresh, private datastore,
  # which keeps the serial `workers: 1` config valid within a shard. Each shard fails loudly
  # on its own (a red shard job) and uploads its `test-results/` trace + video on failure;
  # there is no combined-report merge job. (Bumped 2 → 3 as the spec count grew — each shard
  # runs its files serially, so more shards keeps the per-shard wall-clock bounded as
  # coverage expands.)
  test-e2e:
    name: Test e2e (shard ${{ matrix.shard }})
    needs: changes
    # Skip only on a docs-only diff; any frontend or backend source change runs it.
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # 3-way split on PRs / dispatch, collapsed to a single shard on push to main.
        shard: ${{ fromJSON(needs.changes.outputs.shardMatrix) }}
    env:
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/cat_factory_test
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Background Postgres boot, same rationale + shape as `test-db` above: hide the
      # image pull behind setup/build/browser-install; the wait below gates the tests
      # (Playwright's webServer boots the backend, whose migrate() is the first DB touch).
      - name: Start Postgres (background)
        run: |
          nohup bash -c 'docker run -d --name ci-postgres \
            -e POSTGRES_USER=postgres -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=cat_factory_test \
            -p 5432:5432 postgres:18' > "$RUNNER_TEMP/postgres-start.log" 2>&1 &

      - name: Setup pnpm + Node + install
        uses: ./.github/actions/setup
        with:
          turbo-cache: 'true'

      # The e2e backend imports the built `dist` of the workspace libraries.
      - name: Build libraries
        run: pnpm build

      # Cache the downloaded browser between runs (keyed on the lockfile, which pins the
      # @playwright/test version). Install (with OS deps) on a miss.
      - name: Cache Playwright browser
        id: pw-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright Chromium
        run: pnpm --filter @cat-factory/e2e exec playwright install --with-deps chromium

      # TCP probe, not the unix socket — see the `test-db` wait step for why.
      - name: Wait for Postgres
        run: |
          for _ in $(seq 1 90); do
            if docker exec ci-postgres pg_isready -h 127.0.0.1 -U postgres >/dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done
          cat "$RUNNER_TEMP/postgres-start.log" || true
          docker logs ci-postgres || true
          echo "::error::Postgres did not become ready"
          exit 1

      # Shard index + denominator via env — no inline `${{ }}` in the script body (see the
      # worker lane's note): keeps this off zizmor's template-injection radar.
      - name: Run e2e shard
        env:
          SHARD: ${{ matrix.shard }}
          SHARD_TOTAL: ${{ needs.changes.outputs.shardTotal }}
        run: pnpm --filter @cat-factory/e2e exec playwright test --shard="$SHARD/$SHARD_TOTAL"

      # A red shard fails loudly on its own (the step above exits non-zero, incl. on a flaky
      # retry via `failOnFlakyTests`), so there is no combined-report merge job — the diagnosis
      # material is this shard's console output plus the `test-results/` trace + video below
      # (retain-on-failure), uploaded per shard.
      - name: Upload shard test-results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-test-results-${{ matrix.shard }}
          path: backend/internal/e2e/test-results
          retention-days: 7
          if-no-files-found: ignore

  # Kubernetes integration suite: drives the native K8s runner + environment backends against
  # a REAL k3d (k3s-in-Docker) cluster, so the apiserver behaviours the unit tests only mock
  # (pod-proxy round-trip, server-side apply, the k3s ServiceLB address, real 404/409 semantics)
  # are validated for real. GATED on the `kubernetes` paths filter — both running the suite AND
  # spinning up the cluster only happen when code touching the Kubernetes backends changes; an
  # unrelated PR skips this job entirely (and the gate below treats that skip as a pass).
  test-k8s:
    name: Test k8s (k3d)
    needs: changes
    if: ${{ needs.changes.outputs.kubernetes == 'true' || needs.changes.outputs.deployHarness == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup pnpm + Node + install
        uses: ./.github/actions/setup
        with:
          turbo-cache: 'true'

      # The integration specs import the built `dist` of the workspace libraries.
      - name: Build libraries
        run: pnpm build

      # Pin the cluster tooling by downloading the release binaries directly (no third-party
      # action to keep pinned). k3d runs k3s inside Docker and ships the klipper ServiceLB, so
      # a `type: LoadBalancer` Service actually gets an address. kustomize is pinned to the
      # SAME version the deploy-harness Dockerfile ships (so the integration suite exercises the
      # `kustomize edit` behaviour the image will actually run); the harness suite needs it for
      # its image/namespace-override + secretGenerator cases.
      - name: Install k3d + kubectl + kustomize
        run: |
          K3D_VERSION=v5.7.5
          KUBECTL_VERSION=v1.31.2
          KUSTOMIZE_VERSION=v5.8.1
          curl -sSfL "https://github.com/k3d-io/k3d/releases/download/${K3D_VERSION}/k3d-linux-amd64" -o "$RUNNER_TEMP/k3d"
          curl -sSfL "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl" -o "$RUNNER_TEMP/kubectl"
          curl -sSfL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2F${KUSTOMIZE_VERSION}/kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz" -o "$RUNNER_TEMP/kustomize.tar.gz"
          tar -xzf "$RUNNER_TEMP/kustomize.tar.gz" -C "$RUNNER_TEMP" kustomize
          sudo install -m 0755 "$RUNNER_TEMP/k3d" /usr/local/bin/k3d
          sudo install -m 0755 "$RUNNER_TEMP/kubectl" /usr/local/bin/kubectl
          sudo install -m 0755 "$RUNNER_TEMP/kustomize" /usr/local/bin/kustomize
          k3d version
          kubectl version --client
          kustomize version

      # Bind the apiserver to 127.0.0.1:6443 so the kubeconfig server (and k3s cert SANs) match
      # the host endpoint the Node test process dials. Disable the bundled Traefik: it is a
      # `type: LoadBalancer` Service that klipper ServiceLB pins to host ports 80/443, which
      # would collide with the env suite's own port-80 LoadBalancer Service (its svclb pods
      # could not bind 80, so the Service would never get an address and the URL would never
      # resolve). With Traefik gone, port 80 is free for the test workload.
      # Retry cluster creation: `k3d cluster create` pulls the k3d-proxy / k3d-tools images
      # from ghcr.io, and a transient registry timeout there (`context deadline exceeded`)
      # otherwise fails this required job through no fault of the code under test. Re-pull +
      # retry up to 3 times (clearing any partial cluster first); the k3s image is cached
      # after the first attempt, so a retry is fast.
      - name: Create k3d cluster
        run: |
          for attempt in 1 2 3; do
            if k3d cluster create cf-it --api-port 127.0.0.1:6443 \
              --k3s-arg "--disable=traefik@server:*" --wait --timeout 180s; then
              exit 0
            fi
            echo "::warning::k3d cluster create failed (attempt ${attempt}/3); cleaning up and retrying"
            k3d cluster delete cf-it || true
            sleep 5
          done
          echo "::error::k3d cluster create failed after 3 attempts"
          exit 1

      # Build the tiny mock-harness image (the in-pod HTTP server the runner suite drives) and
      # pre-pull nginx (the env suite's workload), then import BOTH into the cluster so no pod
      # has to pull from a registry — fast and flake-free.
      - name: Build + import test images
        run: |
          docker build -t cat-factory-mock-harness:it \
            backend/packages/integrations/src/modules/kubernetes/test-support/mock-harness
          docker pull nginx:1.27-alpine
          k3d image import cat-factory-mock-harness:it nginx:1.27-alpine -c cf-it

      # A namespace + ServiceAccount for the runner pods, bound to cluster-admin (an ephemeral
      # throwaway cluster), and a short-lived token. The env suite creates its own per-PR
      # namespaces cluster-wide, which cluster-admin also covers.
      - name: Provision ServiceAccount + token + connection env
        run: |
          kubectl create namespace cat-factory-it
          kubectl create serviceaccount cat-factory-it -n cat-factory-it
          kubectl create clusterrolebinding cat-factory-it \
            --clusterrole=cluster-admin --serviceaccount=cat-factory-it:cat-factory-it
          TOKEN="$(kubectl create token cat-factory-it -n cat-factory-it --duration=3600s)"
          echo "::add-mask::$TOKEN"
          SERVER="$(kubectl config view --minify -o jsonpath='{.clusters[0].cluster.server}')"
          SERVER="${SERVER/0.0.0.0/127.0.0.1}"
          CA="$(kubectl config view --minify --raw -o jsonpath='{.clusters[0].cluster.certificate-authority-data}' | base64 -d)"
          {
            echo "K8S_IT_TOKEN=$TOKEN"
            echo "K8S_IT_APISERVER=$SERVER"
            echo 'K8S_IT_CA_PEM<<K8S_CA_EOF'
            echo "$CA"
            echo 'K8S_CA_EOF'
          } >> "$GITHUB_ENV"

      # The two suites share this one cluster spin-up but are independently gated, so a
      # Kubernetes-only change doesn't run the deploy-harness suite and vice versa.
      - name: Kubernetes integration tests
        if: ${{ needs.changes.outputs.kubernetes == 'true' }}
        env:
          K8S_IT_NAMESPACE: cat-factory-it
          K8S_IT_RUNNER_IMAGE: cat-factory-mock-harness:it
        run: pnpm --filter @cat-factory/integrations run test:integration

      # Deploy-harness integration suite: drives `handleDeploy` against the same cluster with the
      # real kubectl/kustomize CLIs. Reuses the `K8S_IT_*` connection exported above; nginx (its
      # workload) was imported in the image step, and it creates its own per-test namespaces.
      - name: Deploy-harness integration tests
        if: ${{ needs.changes.outputs.deployHarness == 'true' }}
        env:
          K8S_IT_NAMESPACE: cat-factory-it
        run: pnpm --filter @cat-factory/deploy-harness run test:integration

      # CLI guided-setup (`cat-factory k3s`) integration suite: runs the CLI's REAL probe +
      # provisioning logic over a process-backed shell against the SAME cf-it cluster (the current
      # kubeconfig context is `k3d-cf-it`), validating the idempotent re-run behaviour — the token
      # stays identical across re-provisions, `kubectl apply` reconciles, nothing is duplicated.
      # It provisions + tears down its own `cat-factory` namespace, so it can't collide with the
      # `cat-factory-it` namespace the suites above use. Gated on the same `kubernetes` filter.
      - name: CLI k3s integration tests
        if: ${{ needs.changes.outputs.kubernetes == 'true' }}
        run: pnpm --filter @cat-factory/cli run test:integration

      - name: Tear down k3d cluster
        if: ${{ always() }}
        run: k3d cluster delete cf-it || true

  # EKS integration suite. NON-BLOCKING (intentionally NOT in the aggregated `Test` gate's
  # `needs`, like `test-e2e`) while floci support settles — the EKS unit tests (the SigV4/STS
  # golden vector + the contract round-trip) already run in the required `test` lane. This job
  # boots floci (a local, LocalStack-compatible AWS emulator whose EKS "real mode" stands up a
  # REAL k3s container per cluster and exposes its Kubernetes API server on a host port), creates
  # a cluster via the AWS CLI, exports its endpoint/CA + test credentials as `EKS_IT_*`, and runs
  # the suite. NOTE (verified against floci 1.5.30): floci wires k3s to its own token webhook that
  # maps any `aws eks get-token` bearer token to cluster-admin — it is NOT aws-iam-authenticator
  # and does NOT verify the SigV4 signature, so this suite exercises the token TRANSPORT while the
  # SigV4 SIGNING correctness is covered by the golden-vector unit test in the required lane. The
  # floci bootstrap is best-effort (`continue-on-error`): if it can't stand a cluster up, the suite
  # self-skips on the missing `EKS_IT_*` env rather than failing.
  test-eks:
    name: Test EKS (floci)
    needs: changes
    if: ${{ needs.changes.outputs.eks == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The integration specs import the built `dist` of the workspace libraries.
      - name: Build libraries
        run: pnpm build

      # Boot floci + create an EKS cluster via the AWS CLI, then export EKS_IT_* for the suite.
      # Best-effort: any failure leaves EKS_IT_* unset, so the suite self-skips (never reds this
      # non-blocking job). Refine the floci invocation here as its tooling stabilises.
      - name: Boot floci + provision EKS cluster
        continue-on-error: true
        run: |
          set -x
          CLUSTER=cat-factory-it
          REGION=us-east-1
          # floci exposes the AWS API on :4566 (LocalStack-compatible endpoint). Published on
          # Docker Hub as floci/floci; pinned to a known-good version rather than :latest so the
          # emulated EKS behaviour matches what this suite is validated against. `-u root` is
          # floci's documented invocation (it needs the mounted docker socket).
          docker run -d --name floci -p 4566:4566 -v /var/run/docker.sock:/var/run/docker.sock -u root floci/floci:1.5.30 || exit 0
          for _ in $(seq 1 30); do curl -sf http://localhost:4566/_localstack/health >/dev/null 2>&1 && break; sleep 2; done
          export AWS_ACCESS_KEY_ID=test AWS_SECRET_ACCESS_KEY=test AWS_DEFAULT_REGION=$REGION
          AWS="aws --endpoint-url=http://localhost:4566 --region $REGION"
          $AWS eks create-cluster --name "$CLUSTER" \
            --role-arn arn:aws:iam::000000000000:role/eks-service-role \
            --resources-vpc-config '{}' || exit 0
          for _ in $(seq 1 60); do
            STATUS="$($AWS eks describe-cluster --name "$CLUSTER" --query 'cluster.status' --output text 2>/dev/null || echo PENDING)"
            [ "$STATUS" = "ACTIVE" ] && break
            sleep 3
          done
          ENDPOINT="$($AWS eks describe-cluster --name "$CLUSTER" --query 'cluster.endpoint' --output text)"
          CA="$($AWS eks describe-cluster --name "$CLUSTER" --query 'cluster.certificateAuthority.data' --output text | base64 -d)"
          [ -n "$ENDPOINT" ] || exit 0
          {
            echo "EKS_IT_APISERVER=$ENDPOINT"
            echo "EKS_IT_REGION=$REGION"
            echo "EKS_IT_CLUSTER_NAME=$CLUSTER"
            echo "EKS_IT_ACCESS_KEY_ID=test"
            echo "EKS_IT_SECRET_ACCESS_KEY=test"
            echo "EKS_IT_STS_HOST=localhost:4566"
            echo "EKS_IT_INSECURE=1"
            echo 'EKS_IT_CA_PEM<<EKS_CA_EOF'
            echo "$CA"
            echo 'EKS_CA_EOF'
          } >> "$GITHUB_ENV"

      # Build the mock-harness image + best-effort LOAD it into floci's emulated k3s. A
      # host-built image is NOT visible to k3s's own containerd, so a runner pod would
      # ImagePullBackOff unless the image is imported — hence `EKS_IT_RUNNER_IMAGE` (which drives
      # the image-needing runner suite) is exported ONLY when a load path actually succeeds. If
      # floci exposes no importable cluster, the var stays unset and the runner suite self-skips,
      # while the environment suite (testConnection/teardown — no image needed) still exercises
      # the minted-token → apiserver seam. `k3d image import` is tried first (floci's k3s is
      # commonly a k3d cluster); refine here as floci's tooling stabilises.
      - name: Build + load mock-harness image into k3s
        continue-on-error: true
        run: |
          set -x
          docker build -t cat-factory-mock-harness:it \
            backend/packages/integrations/src/modules/kubernetes/test-support/mock-harness
          loaded=""
          if command -v k3d >/dev/null 2>&1; then
            CLUSTER="$(k3d cluster list -o json 2>/dev/null | python3 -c 'import sys,json; cs=json.load(sys.stdin); print(cs[0]["name"] if cs else "")' 2>/dev/null || echo "")"
            if [ -n "$CLUSTER" ] && k3d image import cat-factory-mock-harness:it -c "$CLUSTER"; then
              loaded=1
            fi
          fi
          if [ -n "$loaded" ]; then
            echo "EKS_IT_RUNNER_IMAGE=cat-factory-mock-harness:it" >> "$GITHUB_ENV"
          else
            echo "Could not load the image into an emulated k3s cluster; the runner suite will self-skip."
          fi

      - name: EKS integration tests
        env:
          EKS_IT_NAMESPACE: cat-factory-it
        run: pnpm --filter @cat-factory/eks run test:integration

      - name: Tear down floci
        if: ${{ always() }}
        run: docker rm -f floci || true

  # Single aggregated status named "Test" so branch protection can require one
  # check regardless of the job/shard layout. Fails unless every test job passed OR was
  # legitimately skipped by the change-detection gate (no relevant changes → nothing to run).
  # NOTE: `test-e2e` and `test-eks` are intentionally NOT in `needs` — they're non-blocking for
  # now (see their job comments above), so their result does not gate this required status.
  test-gate:
    name: Test
    needs: [changes, test-worker, test-units, test-db, test-k8s]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    steps:
      - name: Verify all test jobs passed (or were correctly skipped)
        env:
          # The change-detection job's own status. It MUST have succeeded: a `skipped` lane is
          # only trustworthy if the paths filter that decided to skip it actually ran. If
          # `changes` failed, the lanes below skip on empty outputs and this gate would pass
          # with nothing tested — so gate on it explicitly to close that fail-open hole.
          CHANGES: ${{ needs.changes.result }}
          # Each lane is `success` when it ran, or `skipped` when the change-detection gate
          # found no relevant changes for it (a pure-backend lane on a frontend/docs PR, any
          # lane on a docs-only PR, or `test-k8s` on a non-Kubernetes PR). Both count as a pass.
          WORKER: ${{ needs.test-worker.result }}
          UNITS: ${{ needs.test-units.result }}
          DB: ${{ needs.test-db.result }}
          K8S: ${{ needs.test-k8s.result }}
        run: |
          echo "changes: $CHANGES | worker: $WORKER | units: $UNITS | db: $DB | k8s: $K8S"
          if [ "$CHANGES" != 'success' ]; then
            echo "::error::change detection did not succeed; refusing to pass the test gate"
            exit 1
          fi
          for lane in "$WORKER" "$UNITS" "$DB" "$K8S"; do
            case "$lane" in
              success | skipped) ;;
              *)
                echo "::error::a required test lane reported '$lane'"
                exit 1
                ;;
            esac
          done
          echo "All required test lanes passed or were skipped with no relevant changes."

  acceptance:
    name: Container acceptance (Docker)
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # zizmor flags cache-poisoning because this job also builds an image
      # (docker/build-push-action below). It is a false positive here: these host
      # caches (pnpm store + node_modules + turbo) never feed that image — the
      # Dockerfile runs its own npm install inside Docker — and the image is loaded
      # for the acceptance test only, never pushed/published. The published runner
      # image is built separately with no-cache (docker-publish.yml). Caching is for
      # the host-side test scaffolding only.
      - name: Setup pnpm + Node + install
        uses: ./.github/actions/setup # zizmor: ignore[cache-poisoning]
        with:
          turbo-cache: 'true'

      # The acceptance scaffolding imports the domain packages and @cat-factory/worker,
      # which now resolve to built `dist`, so build the libraries first.
      - name: Build libraries
        run: pnpm build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      # Pre-build the executor image with a cross-run GHA layer cache and load it
      # into the daemon. The expensive layers (apt git, the global Pi CLI install,
      # the two Pi extensions) restore from cache instead of rebuilding every run.
      # The suite then skips its own (uncached) `docker build` via the env flag.
      - name: Build executor image (cached)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: backend/internal/executor-harness
          file: backend/internal/executor-harness/Dockerfile
          tags: cat-factory-impl-acceptance
          load: true
          cache-from: type=gha,scope=executor-harness
          cache-to: type=gha,mode=max,scope=executor-harness

      # Launches the pre-built executor image and drives a full
      # clone → Pi → commit → push → PR against a dummy streaming LLM proxy and a
      # stub GitHub API (no real provider/GitHub). The runner has Docker +
      # host-gateway, so the suite runs rather than self-skipping.
      - name: Container acceptance tests
        env:
          ACCEPTANCE_PREBUILT_IMAGE: '1'
        run: pnpm --filter @cat-factory/executor-harness run test:acceptance

  changeset:
    name: Changeset present
    # Skip on the Changesets "Release Packages" PR: it consumes the pending
    # changesets (deletes the .changeset/*.md files + applies version bumps), so
    # `changeset status` would always see changed packages with no changeset and
    # fail by construction.
    if: github.event_name == 'pull_request' && github.head_ref != 'changeset-release/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Need history back to the base branch so `changeset status` can diff.
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm + Node + install
        uses: ./.github/actions/setup

      # Fails when versioned packages changed without an accompanying changeset.
      # For changes that genuinely need no release (docs, CI, tests), add an
      # empty changeset: `pnpm changeset --empty`.
      - name: Verify a changeset exists
        env:
          BASE_REF: ${{ github.base_ref }}
        run: pnpm changeset status --since="origin/${BASE_REF}"

  # PR-ONLY pre-merge gate: actionlint + zizmor lint the workflow / composite-action files
  # themselves, which is deterministic from their content and gives no post-merge signal — so
  # it runs on PRs (and manual dispatch) but not on push to main.
  zizmor:
    name: Zizmor (workflow security)
    if: ${{ github.event_name != 'push' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Lint the workflow files themselves (syntax, expression typos, action inputs,
      # shellcheck over run: blocks — shellcheck is preinstalled on ubuntu runners and
      # actionlint picks it up from PATH). Complements zizmor below, which covers only
      # the security dimension. Pinned checksum-verified binary download per repo
      # convention (no third-party action to keep pinned). Note actionlint lints
      # workflows only, not composite actions — zizmor scans .github/actions too.
      - name: Install actionlint
        run: |
          ACTIONLINT_VERSION=1.7.12
          ACTIONLINT_SHA256=8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8
          curl -sSfL "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            -o "$RUNNER_TEMP/actionlint.tar.gz"
          echo "${ACTIONLINT_SHA256}  $RUNNER_TEMP/actionlint.tar.gz" | sha256sum -c -
          tar -xzf "$RUNNER_TEMP/actionlint.tar.gz" -C "$RUNNER_TEMP" actionlint

      - name: Run actionlint
        run: '"$RUNNER_TEMP/actionlint" -color'

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          # Print findings to the job log and fail on them rather than
          # uploading SARIF, so this works without GitHub Advanced Security.
          advanced-security: false
